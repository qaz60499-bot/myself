<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>发疯文学生成器｜炸裂版 v3</title>
<style>
:root {
  --black:#111; --white:#fff; --hot:#ff2d55; --purple:#7c3aed;
  --cyan:#00e5ff; --yellow:#ffe600; --green:#39ff14; --orange:#ff7a00;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  margin:0; min-height:100vh; overflow-x:hidden; color:var(--black);
  font-family:"Arial Black","Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  background:
    radial-gradient(circle at 8% 10%, rgba(255,230,0,.95) 0 8%, transparent 9%),
    radial-gradient(circle at 92% 12%, rgba(0,229,255,.9) 0 10%, transparent 11%),
    radial-gradient(circle at 18% 88%, rgba(57,255,20,.75) 0 10%, transparent 11%),
    radial-gradient(circle at 78% 74%, rgba(255,122,0,.7) 0 12%, transparent 13%),
    linear-gradient(135deg,#ff2d55 0%,#7c3aed 48%,#00e5ff 100%);
}
body::before {
  content:""; position:fixed; inset:0; pointer-events:none; opacity:.13;
  background-image:linear-gradient(45deg,rgba(0,0,0,.9) 25%,transparent 25%),linear-gradient(-45deg,rgba(0,0,0,.9) 25%,transparent 25%);
  background-size:8px 8px; mix-blend-mode:multiply; z-index:0;
}
body::after {
  content:"啊啊啊啊啊 / 救命 / 别管我 / 已黑化 / 脑子冒烟 / 在线崩溃";
  position:fixed; left:-40px; top:42%; width:720px; transform:rotate(-12deg);
  font-size:34px; font-weight:900; letter-spacing:2px; color:rgba(255,255,255,.12);
  text-shadow:2px 2px 0 rgba(0,0,0,.15); pointer-events:none; z-index:0; white-space:nowrap;
}
.bg-doodle { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.bg-doodle span {
  position:absolute; display:inline-flex; align-items:center; justify-content:center;
  border:3px solid #111; box-shadow:5px 5px 0 #111; font-weight:900;
  transform:rotate(var(--rot)); opacity:.9; animation:bgFloat 4s ease-in-out infinite alternate;
}
.d1{left:18px;top:330px;background:#ffe600;border-radius:999px;padding:8px 14px;--rot:12deg}
.d2{right:18px;top:405px;background:#fff;border-radius:16px;padding:10px 13px;--rot:-10deg;animation-delay:.5s}
.d3{left:20px;top:615px;background:#00e5ff;border-radius:18px;padding:10px 14px;--rot:-7deg;animation-delay:.9s}
.d4{right:12px;top:655px;background:#39ff14;border-radius:999px;padding:8px 14px;--rot:9deg;animation-delay:1.2s}
.d5{left:50%;top:255px;background:#ff7a00;color:#fff;border-radius:16px;padding:8px 12px;--rot:5deg;animation-delay:.2s}
.d6{left:60%;bottom:30px;background:#fff;border-radius:999px;padding:8px 14px;--rot:-6deg;animation-delay:1.4s}
.d7{left:4px;top:465px;background:#ff2d55;color:#fff;border-radius:999px;padding:7px 12px;--rot:-14deg;animation-delay:.7s}
.d8{right:4px;top:545px;background:#ffe600;border-radius:14px;padding:8px 12px;--rot:15deg;animation-delay:1s}
.d9{left:40%;top:720px;background:#fff;border-radius:15px;padding:8px 12px;--rot:-9deg;animation-delay:1.5s}
.d10{right:24%;top:160px;background:#39ff14;border-radius:999px;padding:6px 10px;--rot:10deg;animation-delay:1.8s}
@keyframes bgFloat { from{translate:0 0} to{translate:0 -12px} }

.app { width:min(100%,430px); margin:0 auto; min-height:100vh; position:relative; z-index:1; padding:22px 20px 34px; }
.sticker {
  position:absolute; z-index:2; display:inline-flex; align-items:center; justify-content:center; padding:8px 12px;
  background:#fff; border:3px solid #111; border-radius:999px; box-shadow:4px 4px 0 #111;
  font-size:13px; font-weight:900; transform:rotate(-7deg); animation:floaty 2.2s ease-in-out infinite alternate;
}
.s1{top:18px;right:18px;background:#ffe600} .s2{top:118px;left:9px;background:#39ff14;transform:rotate(8deg);animation-delay:.2s}
.s3{top:210px;right:8px;background:#00e5ff;transform:rotate(-11deg);animation-delay:.45s} .s4{bottom:88px;left:10px;background:#ff2d55;color:#fff;transform:rotate(10deg);animation-delay:.65s}
@keyframes floaty { from{translate:0 0} to{translate:0 -8px} }
.hero { padding-top:32px; margin-bottom:22px; }
.status { display:inline-block; background:#111; color:#ffe600; border:2px solid #ffe600; border-radius:999px; padding:8px 12px; font-size:13px; font-weight:900; transform:rotate(-2deg); box-shadow:4px 4px 0 rgba(0,0,0,.4); }
h1 { margin:18px 0 10px; font-size:48px; line-height:.95; color:#fff; letter-spacing:-2px; text-shadow:3px 3px 0 #111,6px 6px 0 #ffe600,9px 9px 0 #ff2d55; -webkit-text-stroke:2px #111; transform:rotate(-3deg); animation:titlePop 1.1s cubic-bezier(.2,1.5,.2,1) both; }
@keyframes titlePop { 0%{opacity:0;transform:scale(.6) rotate(-8deg)} 65%{opacity:1;transform:scale(1.08) rotate(-2deg)} 100%{transform:scale(1) rotate(-3deg)} }
.sub { display:inline-block; background:#ffe600; border:3px solid #111; box-shadow:5px 5px 0 #111; padding:9px 12px; border-radius:14px; font-size:15px; font-weight:900; transform:rotate(2deg); }
.mood-meter { margin-top:18px; width:100%; background:#fff; border:3px solid #111; border-radius:999px; box-shadow:5px 5px 0 #111; padding:5px; }
.mood-bar { height:18px; width:68%; border-radius:999px; background:linear-gradient(90deg,#39ff14,#ffe600,#ff2d55); border:2px solid #111; transition:.35s cubic-bezier(.2,1.4,.2,1); }
.mood-text { margin-top:8px; font-size:12px; color:#fff; font-weight:900; text-shadow:2px 2px 0 #111; }
.section-title { margin:26px 0 12px; color:#fff; font-size:17px; font-weight:900; text-shadow:3px 3px 0 #111; letter-spacing:.5px; }
.category-wrap { display:flex; gap:10px; flex-wrap:wrap; }
.cat { border:3px solid #111; background:#fff; color:#111; border-radius:15px; box-shadow:4px 4px 0 #111; padding:10px 12px; font-size:14px; font-weight:900; cursor:pointer; transform:rotate(var(--r)); transition:.16s ease; }
.cat.active { background:#ffe600; box-shadow:5px 5px 0 #ff2d55; transform:scale(1.04) rotate(var(--r)); }
.cat:active,button:active { transform:translate(4px,4px) scale(.98) rotate(var(--r,0deg)); box-shadow:1px 1px 0 #111!important; }

.card-shell { position:relative; margin-top:26px; }
.card-label { position:absolute; left:18px; top:-17px; z-index:3; background:#ff2d55; color:#fff; border:3px solid #111; border-radius:999px; padding:8px 14px; box-shadow:4px 4px 0 #111; font-size:13px; font-weight:900; transform:rotate(-5deg); }
.emoji-badge { position:absolute; right:14px; top:-22px; z-index:3; width:54px; height:54px; display:grid; place-items:center; background:#00e5ff; border:3px solid #111; border-radius:18px; box-shadow:5px 5px 0 #111; font-size:31px; transform:rotate(10deg); }
.emoji-badge.spin { animation:spinPop .42s ease both; }
@keyframes spinPop { 0%{transform:rotate(-20deg) scale(.5)} 70%{transform:rotate(18deg) scale(1.18)} 100%{transform:rotate(10deg) scale(1)} }
.mad-card { min-height:284px; background:#fff; border:4px solid #111; border-radius:30px; padding:42px 22px 24px; box-shadow:9px 9px 0 #111; position:relative; overflow:hidden; }
.mad-card::before { content:"CRAZY CRAZY CRAZY"; position:absolute; right:-55px; top:44px; transform:rotate(90deg); font-size:18px; color:rgba(255,45,85,.12); font-weight:900; letter-spacing:2px; }
.mad-card::after { content:"!!!"; position:absolute; left:12px; bottom:-20px; font-size:96px; line-height:1; color:rgba(255,230,0,.55); -webkit-text-stroke:2px rgba(0,0,0,.15); font-weight:900; }
.mad-text { position:relative; z-index:2; font-size:26px; line-height:1.36; font-weight:900; white-space:pre-line; letter-spacing:-.5px; }
.mad-text .hot { background:#ffe600; color:#ff2d55; padding:0 4px; border:2px solid #111; box-shadow:3px 3px 0 #111; display:inline-block; transform:rotate(-2deg); }
.tools { margin-top:22px; display:grid; gap:12px; }
.primary { width:100%; height:62px; border:4px solid #111; border-radius:20px; background:#ffe600; color:#111; box-shadow:7px 7px 0 #111; font-size:21px; font-weight:900; cursor:pointer; position:relative; overflow:hidden; }
.primary::after { content:""; position:absolute; inset:-40%; background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.7),transparent 65%); transform:translateX(-120%) rotate(8deg); }
.primary:hover::after { animation:shine .75s ease; } @keyframes shine { to{transform:translateX(120%) rotate(8deg)} }
.secondary-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.secondary { min-height:50px; border:3px solid #111; border-radius:16px; background:#fff; color:#111; box-shadow:5px 5px 0 #111; font-size:15px; font-weight:900; cursor:pointer; }
.share-stage { margin-top:24px; display:none; animation:rise .28s ease both; } .share-stage.show{display:block}
@keyframes rise { from{opacity:0;transform:translateY(24px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
.poster-title{color:#fff;font-size:18px;font-weight:900;text-shadow:3px 3px 0 #111;margin:0 0 12px}
.poster{width:100%;min-height:520px;border:4px solid #111;border-radius:28px;background:radial-gradient(circle at 20% 15%,#ffe600 0 14%,transparent 15%),radial-gradient(circle at 86% 20%,#00e5ff 0 16%,transparent 17%),linear-gradient(145deg,#ff2d55,#7c3aed 58%,#111);box-shadow:9px 9px 0 #111;padding:22px;position:relative;overflow:hidden}
.poster::before{content:"疯疯文学研究所";position:absolute;right:-42px;top:230px;transform:rotate(90deg);color:rgba(255,255,255,.18);font-size:18px;font-weight:900;letter-spacing:3px}
.poster-head{color:#fff;font-size:32px;line-height:1;font-weight:900;-webkit-text-stroke:1.5px #111;text-shadow:4px 4px 0 #ffe600;transform:rotate(-3deg)}
.poster-body{margin-top:36px;background:#fff;border:4px solid #111;border-radius:24px;box-shadow:7px 7px 0 #111;min-height:270px;padding:24px 18px;font-size:28px;line-height:1.35;font-weight:900;white-space:pre-line}
.poster-foot{margin-top:22px;display:flex;gap:14px;align-items:center}
.qr{width:78px;height:78px;border:4px solid #111;background:linear-gradient(90deg,#000 10px,transparent 10px 20px,#000 20px 30px,transparent 30px),linear-gradient(#000 10px,transparent 10px 20px,#000 20px 30px,transparent 30px),#fff;background-size:30px 30px;box-shadow:5px 5px 0 #111}
.poster-tip{flex:1;background:#ffe600;border:3px solid #111;border-radius:16px;box-shadow:5px 5px 0 #111;padding:10px;font-size:14px;line-height:1.35;font-weight:900;transform:rotate(2deg)}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(30px);opacity:0;background:#111;color:#ffe600;border:3px solid #ffe600;box-shadow:5px 5px 0 #000;border-radius:999px;padding:10px 15px;font-size:14px;font-weight:900;z-index:20;transition:.2s ease;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.shake{animation:shake .24s linear} @keyframes shake{0%{transform:translateX(0) rotate(0deg)}25%{transform:translateX(-6px) rotate(-1deg)}50%{transform:translateX(6px) rotate(1deg)}75%{transform:translateX(-4px) rotate(-1deg)}100%{transform:translateX(0) rotate(0deg)}}
.burst{position:fixed;z-index:30;pointer-events:none;font-size:21px;font-weight:900;color:#ffe600;-webkit-text-stroke:1.4px #111;animation:burstFly 1.25s ease-out forwards}
@keyframes burstFly{from{opacity:1;transform:translate(-50%,-50%) scale(.55) rotate(0deg)}to{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25) rotate(var(--rot))}}
.screen-flash{position:fixed;inset:0;z-index:25;background:rgba(255,230,0,.28);pointer-events:none;opacity:0} .screen-flash.show{animation:flash .28s ease-out} @keyframes flash{0%{opacity:0}35%{opacity:1}100%{opacity:0}}
.flying-sticker{position:fixed;left:50%;top:50%;z-index:28;pointer-events:none;padding:7px 11px;border:3px solid #111;border-radius:999px;background:#fff;box-shadow:4px 4px 0 #111;font-weight:900;font-size:13px;animation:stickerFly 1.1s ease-out forwards}
@keyframes stickerFly{from{opacity:0;transform:translate(-50%,-50%) scale(.5) rotate(-20deg)}20%{opacity:1}to{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.15) rotate(var(--rot))}}
@media(max-width:360px){h1{font-size:42px}.mad-text{font-size:23px}.poster-body{font-size:24px}}
</style>
</head>
<body>
<div class="screen-flash" id="screenFlash"></div>
<div class="bg-doodle">
  <span class="d1">啊啊啊</span><span class="d2">救命</span><span class="d3">禁止内耗</span><span class="d4">别管</span>
  <span class="d5">情绪过载</span><span class="d6">已疯</span><span class="d7">重开？</span><span class="d8">脑子冒烟</span>
  <span class="d9">别催</span><span class="d10">ON</span>
</div>
<main class="app">
  <div class="sticker s1">ON FIRE</div><div class="sticker s2">救命</div><div class="sticker s3">别管我</div><div class="sticker s4">已疯</div>
  <section class="hero">
    <div class="status" id="statusText">今日精神状态：非常不稳定</div>
    <h1>发疯文学<br>生成器</h1>
    <div class="sub">今天不发疯，明天就发霉。</div>
    <div class="mood-meter"><div class="mood-bar" id="moodBar"></div></div>
    <div class="mood-text" id="moodText">崩溃值：68%｜还能抢救一下</div>
  </section>
  <section>
    <div class="section-title">选择你的崩溃频道</div>
    <div class="category-wrap">
      <button class="cat active" style="--r:-2deg" data-type="work">上班发疯｜已黑化</button>
      <button class="cat" style="--r:1deg" data-type="study">学习发疯｜脑子冒烟</button>
      <button class="cat" style="--r:-1deg" data-type="night">熬夜发疯｜灵魂出走</button>
      <button class="cat" style="--r:2deg" data-type="worker">打工人发疯｜工牌成精</button>
      <button class="cat" style="--r:-2deg" data-type="love">恋爱发疯｜心脏报警</button>
    </div>
  </section>
  <section class="card-shell">
    <div class="card-label" id="cardLabel">当前精神状态</div><div class="emoji-badge" id="emojiBadge">🤯</div>
    <div class="mad-card" id="madCard"><div class="mad-text" id="madText">点击下面按钮，<span class="hot">开始合法发疯</span>。</div></div>
  </section>
  <section class="tools">
    <button class="primary" id="generateBtn">💥 开始发疯</button>
    <div class="secondary-grid">
      <button class="secondary" id="againBtn">🔄 再疯一次</button>
      <button class="secondary" id="copyBtn">📋 复制发疯</button>
      <button class="secondary" id="shareBtn">📸 生成疯图</button>
      <button class="secondary" id="chaosBtn">⚡ 随机崩溃</button>
    </div>
  </section>
  <section class="share-stage" id="shareStage">
    <p class="poster-title">截图分享页｜小红书传播图</p>
    <div class="poster">
      <div class="poster-head">今日发疯文学</div>

      <div class="poster-foot"><div class="qr"></div><div class="poster-tip">扫码生成你的今日发疯文学<br>转发给同样快疯的人</div></div>
    </div>
  </section>
</main>
<div class="toast" id="toast">已复制，继续发疯！</div>
<script>
const library = {"work": {"label": "上班发疯｜已黑化", "emoji": ["🤯", "💼", "🔥", "😵‍💫", "🧨", "🫠", "📎", "☠️"], "status": ["今日精神状态：工位起火", "今日精神状态：老板别看", "今日精神状态：灵魂旷工", "今日精神状态：会议过敏", "今日精神状态：表格中毒"], "lines": ["我不是来上班的，\n我是来见证<span class='hot'>人类忍耐力极限</span>的。\n这个班我先上着，\n但我的灵魂已经递交离职申请了。", "老板说要有主人翁精神，\n我懂了，\n现在公司是我的，\n所以我宣布：<span class='hot'>全体下班</span>。", "我每天都准时到公司，\n不是因为我自律，\n是因为<span class='hot'>贫穷</span>比闹钟更响。", "这个会开得很好，\n好到我的灵魂已经离开工位，\n在天花板上写：<span class='hot'>别叫我</span>。", "电脑开机了，\n我的人也开机了，\n但是我的精神系统显示：<span class='hot'>未响应</span>。", "我对工作没有意见，\n我只是对每天都要工作这件事\n产生了强烈的<span class='hot'>宇宙级疑问</span>。", "同事问我怎么了，\n我说没事。\n其实我的内心正在开十万个窗口，\n每个窗口都写着：<span class='hot'>想下班</span>。", "我今天很稳定，\n稳定地想逃跑，\n稳定地想暴富，\n稳定地对着表格<span class='hot'>发出尖叫</span>。", "上班第一小时，\n我已经把今天的耐心用完了。\n剩下七小时靠<span class='hot'>表情管理</span>续命。", "我不是情绪不好，\n我是对工位产生了\n非常具体的<span class='hot'>逃离冲动</span>。", "每次打开工作群，\n我的手机都像在提醒我：\n你的快乐余额<span class='hot'>不足</span>。", "我和老板之间最稳定的关系，\n就是他画饼，\n我假装<span class='hot'>吃饱了</span>。", "这不是早会，\n这是大型人类清醒度\n<span class='hot'>消耗仪式</span>。", "我在工位上坐得很端正，\n但我的灵魂已经在楼下\n<span class='hot'>骑共享单车跑路</span>。", "我现在不是困，\n我是被工作抽走了\n<span class='hot'>人类电量</span>。", "邮件一封接一封，\n像命运往我脸上\n疯狂贴<span class='hot'>便利贴</span>。", "我今天的目标很简单：\n不崩溃，\n不暴走，\n不对 Excel <span class='hot'>说脏话</span>。", "领导说辛苦一下，\n我笑了。\n我已经辛苦成了\n<span class='hot'>人形压缩包</span>。", "我在公司最大的成长，\n是学会了把尖叫\n压缩成一句：<span class='hot'>好的</span>。", "这份工作让我明白，\n人类的极限不是体力，\n是<span class='hot'>装没事</span>。", "上班像开盲盒，\n你永远不知道今天会抽到\n哪个<span class='hot'>离谱任务</span>。", "我不想摸鱼，\n我只是需要确认自己\n还属于<span class='hot'>自然界</span>。", "老板让我积极一点，\n我已经很积极了，\n积极地想<span class='hot'>下班</span>。", "我对工作充满热情，\n主要是火气。\n火很旺，\n情很少。", "今日办公状态：\n身体在工位，\n脑子在缓存，\n灵魂在<span class='hot'>排队离职</span>。", "我不是效率低，\n我是大脑正在对任务进行\n<span class='hot'>道德审判</span>。", "我和打印机一样，\n表面正常运行，\n内心一直<span class='hot'>卡纸</span>。", "如果沉默有声音，\n我的工位现在应该正在\n<span class='hot'>报警</span>。", "我不是想请假，\n我是觉得我的灵魂\n需要一次<span class='hot'>系统升级</span>。", "今天的我很适合工作，\n适合把工作放一边，\n先研究一下<span class='hot'>人生意义</span
