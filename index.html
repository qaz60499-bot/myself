<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Little Odd Street - More Houses Cobblestone</title>
<style>
  :root{
    --ink:#2e2633;
    --night:#191520;
    --cream:#fff0c7;
    --amber:#ffd48a;
    --mx: 0px;
    --my: 0px;
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;width:100%;height:100%;overflow:hidden;background:var(--night);
    font-family:ui-rounded,"Nunito","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  }

  .app{
    position:relative;width:100vw;height:100vh;overflow:hidden;color:var(--cream);
    background:#18131d;
  }

  /*
    可选：把你确认的 Canva 场景图导出为 scene3.png，和 index.html 放同一层。
    有 scene3.png 时，走到场景 3 会叠加显示那张图；没放也不影响内置街景。
  */
  .canva-scene3{
    position:absolute;inset:0;z-index:1;
    background:url("scene3.png") center/cover no-repeat;
    opacity:0;transform:scale(1.08);
    transition:opacity .9s ease,transform 1.35s cubic-bezier(.2,.85,.2,1),filter .9s ease;
    pointer-events:none;
  }
  .app.step-3 .canva-scene3{opacity:1;transform:scale(1.01)}

  .scene{
    position:absolute;inset:0;z-index:2;overflow:hidden;
    background:
      radial-gradient(circle at 50% 82%,rgba(255,226,153,.48),transparent 29%),
      radial-gradient(circle at 18% 16%,rgba(255,220,152,.19),transparent 8%),
      radial-gradient(circle at 82% 18%,rgba(150,171,211,.18),transparent 10%),
      linear-gradient(180deg,#302f4b 0%,#67576a 47%,#e7aa70 100%);
    transition:opacity .9s ease,transform 1.35s cubic-bezier(.2,.85,.2,1),filter .9s ease;
  }
  .app.step-1 .scene{opacity:1;transform:scale(1) translate(var(--mx), var(--my))}
  .app.step-2 .scene{opacity:1;transform:scale(1.08) translate(calc(var(--mx) * .7), calc(1.2vh + var(--my) * .7))}
  .app.step-3 .scene{opacity:.22;transform:scale(1.18) translate(calc(var(--mx) * .45), calc(3vh + var(--my) * .45));filter:blur(.8px)}

  .sun{
    position:absolute;left:44%;top:11%;width:33vmin;height:33vmin;border-radius:50%;
    background:radial-gradient(circle,rgba(255,221,143,.36),rgba(255,221,143,.1) 48%,transparent 73%);
    animation:sunBreath 4s ease-in-out infinite alternate;
  }
  @keyframes sunBreath{from{transform:scale(.98);opacity:.82}to{transform:scale(1.05);opacity:1}}

  .stars{
    position:absolute;inset:0;z-index:3;pointer-events:none;
  }
  .star{
    position:absolute;width:3px;height:3px;border-radius:50%;
    background:#fff3bf;box-shadow:0 0 10px #ffe5a0;
    animation:twinkle 1.6s ease-in-out infinite alternate;
  }
  .star:after{
    content:"";position:absolute;left:50%;top:50%;width:13px;height:13px;
    transform:translate(-50%,-50%) rotate(45deg);
    background:linear-gradient(90deg,transparent 42%,rgba(255,240,184,.8) 43% 57%,transparent 58%),
               linear-gradient(0deg,transparent 42%,rgba(255,240,184,.8) 43% 57%,transparent 58%);
    opacity:.55;
  }
  @keyframes twinkle{from{transform:scale(.55);opacity:.35}to{transform:scale(1.2);opacity:1}}

  .road{
    position:absolute;left:50%;bottom:-9vh;width:min(720px,64vw);height:78vh;transform:translateX(-50%);
    clip-path:polygon(43% 0,57% 0,100% 100%,0 100%);
    background:
      repeating-linear-gradient(90deg,rgba(92,59,57,.14) 0 3px,transparent 3px 56px),
      repeating-linear-gradient(0deg,transparent 0 76px,rgba(92,59,57,.18) 77px 81px),
      linear-gradient(180deg,#a96d62 0%,#c98b63 43%,#efbf79 100%);
    box-shadow:inset 0 24px 48px rgba(67,42,48,.2);
  }
  .road:before{
    content:"";position:absolute;inset:0;
    background:
      linear-gradient(105deg,transparent 0 34%,rgba(255,255,255,.14) 36% 39%,transparent 41%),
      radial-gradient(ellipse at 50% 100%,rgba(255,243,198,.18),transparent 58%);
  }

  .road-doodles{
    position:absolute;left:50%;bottom:0;width:min(760px,70vw);height:32vh;transform:translateX(-50%);
    pointer-events:none;z-index:9;
    background:
      radial-gradient(ellipse at 42% 68%,rgba(93,60,61,.18) 0 3px,transparent 4px),
      radial-gradient(ellipse at 62% 46%,rgba(93,60,61,.14) 0 2px,transparent 3px),
      radial-gradient(ellipse at 35% 30%,rgba(255,241,193,.25) 0 4px,transparent 5px),
      linear-gradient(110deg,transparent 0 43%,rgba(255,255,255,.1) 44% 46%,transparent 47%);
  }

  .shop{
    position:absolute;bottom:12vh;width:31vw;max-width:480px;height:61vh;border-radius:30px 30px 8px 8px;
    box-shadow:0 28px 45px rgba(42,28,35,.24);
  }
  .shop.left{
    left:4vw;background:
      linear-gradient(90deg,rgba(255,255,255,.14),transparent 18%),
      linear-gradient(180deg,#f2bd85,#c97868);
    transform:perspective(900px) rotateY(8deg) skewY(-1deg);
  }
  .shop.right{
    right:4vw;background:
      linear-gradient(270deg,rgba(255,255,255,.15),transparent 18%),
      linear-gradient(180deg,#f2d28f,#b86f70);
    transform:perspective(900px) rotateY(-8deg) skewY(1deg);
  }
  .shop:before{
    content:"";position:absolute;left:-2%;top:-8%;width:104%;height:14%;border-radius:22px;
    background:repeating-linear-gradient(90deg,#fff2bd 0 34px,#ec806d 34px 68px);
    box-shadow:0 9px 0 rgba(71,45,49,.13);
  }
  .shop:after{
    content:"";position:absolute;left:7%;right:7%;bottom:5%;height:2px;
    background:rgba(60,43,49,.18);box-shadow:0 -70px rgba(60,43,49,.1),0 -142px rgba(60,43,49,.08);
  }

  .brick-lines{
    position:absolute;inset:13% 5% 7%;border-radius:18px;opacity:.26;pointer-events:none;
    background:
      repeating-linear-gradient(0deg, transparent 0 42px, rgba(69,45,50,.3) 43px 45px),
      repeating-linear-gradient(90deg, transparent 0 88px, rgba(69,45,50,.22) 89px 91px);
    mix-blend-mode:multiply;
  }

  .window{
    position:absolute;border:4px solid rgba(72,48,54,.38);border-radius:20px;
    background:
      linear-gradient(135deg,rgba(255,255,255,.4),transparent 36%),
      linear-gradient(180deg,#ffe6a7,#ffad75);
    box-shadow:inset 0 -10px 0 rgba(174,81,71,.12),0 12px 22px rgba(255,181,98,.18);
    transition:filter .25s ease,transform .25s ease,box-shadow .25s ease;
    pointer-events:auto;cursor:pointer;
  }
  .window:hover,.window.lit{
    filter:brightness(1.12);
    transform:translateY(-2px);
    box-shadow:inset 0 -10px 0 rgba(174,81,71,.12),0 0 36px rgba(255,190,105,.55);
  }
  .window:before{content:"";position:absolute;left:50%;top:0;width:3px;height:100%;background:rgba(87,55,59,.18)}
  .window:after{content:"";position:absolute;left:0;top:50%;width:100%;height:3px;background:rgba(87,55,59,.16)}
  .left .window.a{left:14%;top:24%;width:35%;height:23%}
  .left .window.b{right:12%;top:33%;width:30%;height:18%}
  .right .window.a{left:13%;top:28%;width:33%;height:22%}
  .right .window.b{right:13%;top:18%;width:30%;height:18%}

  .shelf{
    position:absolute;left:12%;bottom:10%;width:76%;height:11%;border-radius:14px;background:rgba(255,238,187,.45);
    box-shadow:inset 0 -5px rgba(126,75,68,.16);
  }
  .shelf:before{
    content:"";position:absolute;left:12%;bottom:55%;width:16%;height:70%;border-radius:7px;background:#78a99d;
    box-shadow:42px 4px #f0b36f,82px -2px #d9786a,124px 2px #f4d98f;
  }

  .door{
    position:absolute;left:35%;bottom:0;width:30%;height:30%;border-radius:22px 22px 5px 5px;
    background:radial-gradient(circle at 78% 52%,#ffdc92 0 4px,transparent 5px),linear-gradient(180deg,#5f4258,#31263d);
    box-shadow:inset 0 0 0 4px rgba(255,226,162,.15);
  }

  .back-shop{
    position:absolute;left:38vw;bottom:36vh;width:24vw;height:31vh;border-radius:22px 22px 6px 6px;
    background:linear-gradient(180deg,#f1c17c,#ba7469);opacity:.92;box-shadow:0 20px 32px rgba(43,28,35,.16);
  }
  .back-shop:before{
    content:"";position:absolute;left:-4%;top:-11%;width:108%;height:17%;border-radius:18px;
    background:repeating-linear-gradient(90deg,#fdf0b7 0 24px,#d9796b 24px 48px);
  }
  .back-shop:after{
    content:"";position:absolute;left:18%;top:28%;width:62%;height:34%;border-radius:14px;
    background:linear-gradient(180deg,#ffe4a1,#f2a56f);border:3px solid rgba(72,48,54,.3);
  }

  .dark-alley{
    position:absolute;right:27%;top:35%;width:16vw;height:34vh;border-radius:48% 52% 28% 28%;
    background:
      radial-gradient(circle at 62% 18%,rgba(124,145,190,.28),transparent 21%),
      linear-gradient(180deg,rgba(43,42,76,.87),rgba(34,27,48,.5));
    opacity:.74;transition:opacity .25s ease,filter .25s ease;
  }
  .dark-alley:hover{opacity:.9;filter:brightness(1.08)}

  .line{position:absolute;left:22vw;top:26vh;width:56vw;height:2px;background:rgba(67,45,52,.38);transform:rotate(-3deg)}
  .cloth{position:absolute;top:2px;width:38px;height:30px;border-radius:4px 4px 10px 10px;box-shadow:0 4px 0 rgba(93,58,57,.12);transform-origin:top center;animation:swing 2.8s ease-in-out infinite alternate}
  .c1{left:18%;background:#ffb1a1}.c2{left:30%;height:36px;background:#dce7ac;animation-delay:.3s}.c3{left:44%;background:#f6e1a3;animation-delay:.6s}
  @keyframes swing{from{transform:rotate(-2deg)}to{transform:rotate(3deg)}}

  .lamp{
    position:absolute;left:36vw;bottom:25vh;width:1.1vw;min-width:8px;height:34vh;border-radius:999px;background:#3f3347;
    cursor:pointer;z-index:11;pointer-events:auto;
  }
  .lamp:before{
    content:"";position:absolute;left:50%;top:-7vh;width:8vh;height:8vh;transform:translateX(-50%);
    border-radius:50%;background:radial-gradient(circle,#ffe8ac 0 35%,#e8896f 37% 62%,transparent 63%);
    box-shadow:0 0 42px rgba(255,202,117,.65);
    transition:box-shadow .25s ease,filter .25s ease;
  }
  .lamp.off:before{filter:saturate(.45) brightness(.6);box-shadow:0 0 10px rgba(255,202,117,.18)}

  .vending{
    position:absolute;right:28vw;bottom:20vh;width:7.8vw;min-width:74px;height:20vh;
    border-radius:18px;background:linear-gradient(180deg,#8db6ad,#5c857f);
    box-shadow:0 20px 28px rgba(52,31,35,.24);z-index:10;cursor:pointer;pointer-events:auto;
    transition:transform .2s ease,filter .2s ease;
  }
  .vending:hover{transform:translateY(-4px);filter:brightness(1.08)}
  .vending:before{
    content:"";position:absolute;left:18%;top:12%;width:62%;height:48%;border-radius:10px;
    background:linear-gradient(180deg,#e9f5cf,#ffb989);
    box-shadow:inset 0 -6px rgba(91,69,67,.12);
  }
  .vending:after{
    content:"";position:absolute;left:22%;bottom:12%;width:56%;height:16%;border-radius:8px;background:#3d3140;
  }
  .vending .can{
    position:absolute;left:50%;bottom:10%;width:18px;height:26px;border-radius:6px;background:#f0c56e;
    transform:translateX(-50%) translateY(20px);opacity:0;transition:.45s ease;
  }
  .vending.drop .can{opacity:1;transform:translateX(-50%) translateY(38px) rotate(18deg)}

  .object{position:absolute;z-index:12;border-radius:16px;box-shadow:0 10px 18px rgba(52,34,38,.15);pointer-events:auto}
  .box{left:9vw;bottom:7vh;width:9vw;height:7vh;background:#bd7c5b;transform:rotate(-7deg);cursor:pointer}
  .box.open{transform:rotate(-7deg) translateY(-4px)}
  .box:after{content:"";position:absolute;left:10%;top:20%;width:80%;height:3px;background:rgba(72,48,52,.2);box-shadow:0 14px rgba(72,48,52,.12)}
  .bag{left:23vw;bottom:8vh;width:5vw;height:6.5vh;background:#f6db9d;border-radius:12px 12px 18px 18px;transform:rotate(6deg)}
  .bag:before{content:"";position:absolute;left:28%;top:-22%;width:45%;height:34%;border:3px solid #8b6358;border-bottom:0;border-radius:999px 999px 0 0}
  .paper{right:12vw;bottom:13vh;width:7vw;height:4.5vh;background:#fff0bf;transform:rotate(13deg);cursor:pointer}
  .paper.fly{animation:paperFly .9s ease}
  @keyframes paperFly{0%{transform:rotate(13deg) translate(0,0)}50%{transform:rotate(30deg) translate(-26px,-28px)}100%{transform:rotate(13deg) translate(0,0)}}
  .paper:after{content:"";position:absolute;left:15%;top:50%;width:70%;height:2px;background:rgba(89,57,58,.16);box-shadow:0 -8px rgba(89,57,58,.12)}
  .puddle{right:23vw;bottom:6vh;width:13vw;height:5vh;background:rgba(109,127,152,.32);border-radius:50%;box-shadow:inset 0 0 18px rgba(255,255,255,.18);cursor:pointer}
  .puddle.ripple:after{content:"";position:absolute;inset:15%;border:2px solid rgba(255,255,255,.35);border-radius:50%;animation:ripple .65s ease-out}
  @keyframes ripple{from{transform:scale(.4);opacity:1}to{transform:scale(1.5);opacity:0}}
  .plant{right:36vw;bottom:9vh;width:6vh;height:6vh;background:#cd7f61;border-radius:0 0 16px 16px;cursor:pointer}
  .plant:before{
    content:"";position:absolute;left:-2.1vh;bottom:3.8vh;width:10vh;height:8vh;transition:transform .25s ease;
    background:
      radial-gradient(circle at 30% 55%,#6a985d 0 18%,transparent 19%),
      radial-gradient(circle at 55% 32%,#83aa6e 0 20%,transparent 21%),
      radial-gradient(circle at 76% 60%,#5e8d56 0 18%,transparent 19%);
  }
  .plant:hover:before,.plant.grow:before{transform:scale(1.12) translateY(-4px)}

  .cat{
    position:absolute;left:31vw;bottom:9vh;z-index:14;width:7vh;height:4.5vh;background:#5b4249;border-radius:70% 70% 50% 50%;
    cursor:pointer;pointer-events:auto;transition:left .65s ease,bottom .35s ease,transform .35s ease;
  }
  .cat:before,.cat:after{content:"";position:absolute;top:-1.8vh;border-left:1.45vh solid transparent;border-right:1.45vh solid transparent;border-bottom:2.35vh solid #5b4249}
  .cat:before{left:.7vh}.cat:after{right:.7vh}
  .cat.walk{left:36vw;bottom:12vh;transform:scaleX(-1)}

  .cat2{
    position:absolute;right:8vw;bottom:8vh;z-index:18;width:8vh;height:5vh;background:#e6b06f;border-radius:70% 70% 48% 48%;
    cursor:pointer;transition:right .7s ease, transform .35s ease;pointer-events:auto;
  }
  .cat2:before,.cat2:after{content:"";position:absolute;top:-1.9vh;border-left:1.4vh solid transparent;border-right:1.4vh solid transparent;border-bottom:2.5vh solid #e6b06f}
  .cat2:before{left:.8vh}.cat2:after{right:.8vh}
  .cat2:after{border-bottom-color:#d88d61}
  .cat2.move{right:14vw;transform:translateY(-5px)}

  .npc{
    position:absolute;z-index:16;bottom:21vh;width:42px;height:92px;cursor:pointer;pointer-events:auto;
    transition:transform .35s ease, bottom .5s ease;
  }
  .npc:hover{transform:translateY(-5px)}
  .npc .h{position:absolute;left:50%;top:0;width:30px;height:30px;border-radius:50%;transform:translateX(-50%);background:#3b3044}
  .npc .b{position:absolute;left:50%;top:28px;width:34px;height:43px;border-radius:15px 15px 10px 10px;transform:translateX(-50%);background:#f1a46c}
  .npc .l1,.npc .l2{position:absolute;top:68px;width:11px;height:24px;border-radius:999px;background:#3b3559}
  .npc .l1{left:10px;transform:rotate(8deg)}.npc .l2{right:10px;transform:rotate(-8deg)}
  .npc.one{left:18vw;bottom:28vh;transform:scale(.86)}
  .npc.two{right:20vw;bottom:30vh;transform:scale(.78)}
  .npc.three{left:52vw;bottom:42vh;transform:scale(.55);opacity:.88}
  .npc.one .b{background:#79a99d}.npc.two .b{background:#e3b55f}.npc.three .b{background:#d97d72}

  .bubble{
    position:absolute;left:50%;top:2.5vh;z-index:9999;
    max-width:min(78vw,420px);padding:.72rem 1.05rem;border-radius:20px;
    background:rgba(255,244,207,.96);color:#49343d;font-weight:900;font-size:clamp(.86rem,1.25vw,1.05rem);
    box-shadow:0 16px 34px rgba(42,28,35,.28);
    opacity:0;transform:translateX(-50%) translateY(-12px);transition:.25s ease;pointer-events:none;
    border:2px solid rgba(70,48,54,.18);
    text-align:center;
  }
  .bubble.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .sign{
    position:absolute;z-index:30;padding:.64rem .92rem;border-radius:999px;color:#49343d;background:rgba(255,242,197,.9);
    border:3px solid rgba(72,49,56,.33);box-shadow:0 13px 0 rgba(82,50,53,.12),0 18px 30px rgba(50,31,37,.18);
    text-decoration:none;font-size:clamp(.64rem,1.08vw,.95rem);letter-spacing:.07em;
    transition:transform .25s ease,filter .25s ease,opacity .45s ease;
  }
  .sign:hover{transform:translateY(-6px) scale(1.04) rotate(var(--r,-3deg));filter:brightness(1.08)}
  .story{left:8vw;top:22vh;--r:-3deg;transform:rotate(-3deg)}
  .lab{right:12vw;top:24vh;--r:4deg;transform:rotate(4deg)}
  .moon{left:16vw;top:56vh;--r:2deg;transform:rotate(2deg)}
  .archive{right:15vw;top:55vh;--r:-2deg;transform:rotate(-2deg)}

  .person{
    position:absolute;left:50%;bottom:9vh;width:clamp(170px,18vw,258px);aspect-ratio:.54;transform:translateX(-50%);
    z-index:45;cursor:pointer;border:0;padding:0;margin:0;background:transparent;outline:0;appearance:none;-webkit-tap-highlight-color:transparent;
    transition:bottom 1200ms cubic-bezier(.22,.9,.22,1),width 1200ms cubic-bezier(.22,.9,.22,1),filter .35s ease;
    filter:drop-shadow(0 17px 18px rgba(31,22,31,.28));
  }
  .person:focus,.person:focus-visible,.person:active{outline:0;box-shadow:none}
  .person:hover{filter:drop-shadow(0 17px 18px rgba(31,22,31,.28)) drop-shadow(0 0 12px rgba(255,218,141,.42))}
  .app.step-1 .person{bottom:9vh;width:clamp(175px,18.5vw,268px)}
  .app.step-2 .person{bottom:23vh;width:clamp(144px,14vw,205px)}
  .app.step-3 .person{bottom:32vh;width:clamp(118px,11vw,165px)}
  .person svg{width:100%;height:100%;display:block;overflow:visible}

  .arm-left,.arm-right,.leg-left,.leg-right{transform-box:fill-box;transform-origin:top center}
  .person.walking .leg-left{animation:legL .56s ease-in-out infinite alternate}
  .person.walking .leg-right{animation:legR .56s ease-in-out infinite alternate}
  .person.walking .arm-left{animation:armL .56s ease-in-out infinite alternate}
  .person.walking .arm-right{animation:armR .56s ease-in-out infinite alternate}
  .person.walking .body-bob{animation:bob .56s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:center}
  @keyframes legL{from{transform:rotate(-14deg)}to{transform:rotate(11deg)}}
  @keyframes legR{from{transform:rotate(12deg)}to{transform:rotate(-10deg)}}
  @keyframes armL{from{transform:rotate(10deg)}to{transform:rotate(-9deg)}}
  @keyframes armR{from{transform:rotate(-10deg)}to{transform:rotate(9deg)}}
  @keyframes bob{from{transform:translateY(0)}to{transform:translateY(-3px)}}

  .title{
    position:absolute;left:50%;top:5vh;z-index:60;transform:translateX(-50%);text-align:center;pointer-events:none;
    color:#fff3cd;text-shadow:0 4px 0 rgba(71,43,49,.16);transition:opacity .55s ease,transform .55s ease;
  }
  .title h1{margin:0;font-size:clamp(1.7rem,4.2vw,4rem);letter-spacing:.035em}
  .title p{margin:.35rem 0 0;font-size:clamp(.82rem,1.25vw,1.08rem);opacity:.82}
  .app.step-3 .title{opacity:.18;transform:translateX(-50%) translateY(-10px)}

  .controls{
    position:absolute;left:50%;bottom:3vh;z-index:70;transform:translateX(-50%);
    display:flex;gap:.6rem;align-items:center;padding:.45rem;border-radius:999px;
    background:rgba(50,39,52,.52);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(12px);
  }
  .control{border:0;padding:.72rem .95rem;border-radius:999px;background:rgba(255,244,207,.82);color:#4e3541;font-weight:800;cursor:pointer}
  .control:disabled{opacity:.42;cursor:not-allowed}
  .hint{font-size:clamp(.74rem,1vw,.92rem);color:rgba(255,247,223,.92);padding:0 .45rem;white-space:nowrap}

  @media(max-width:760px){
    .shop{width:44vw}.shop.left{left:-10vw}.shop.right{right:-10vw}.road{width:78vw}.back-shop{width:34vw;left:33vw}
    .story{left:4vw;top:24vh}.lab{right:4vw;top:27vh}.moon{left:7vw;top:58vh}.archive{right:8vw;top:59vh}
    .app.step-1 .person{width:156px}.app.step-2 .person{width:128px}.app.step-3 .person{width:104px}
    .controls{width:calc(100vw - 24px);justify-content:center;bottom:2vh}.hint{display:none}
    .vending{right:21vw;width:13vw}
    .npc{display:none}
  }


/* ===== Perspective houses + soft old cobblestone road enhancement ===== */
.scene{isolation:isolate;}
.back-shop{z-index:4;}
.shop{z-index:8;}
.road{z-index:5;}
.road-doodles{z-index:10;opacity:.45;filter:blur(.2px);}
.dark-alley{z-index:7;}
.sun{z-index:1;}
.stars{z-index:3;}

/* ===== FINAL ENHANCEMENT PASS: focus character + deeper street + clickable affordance ===== */
:root{--focus-warm:rgba(255,218,142,.72);--soft-cream:rgba(255,244,207,.92)}

/* 标题区：更精致但不加重 */
.title::before{
  content:"";position:absolute;left:50%;top:42%;width:min(560px,72vw);height:150px;
  transform:translate(-50%,-50%);border-radius:50%;z-index:-1;pointer-events:none;
  background:radial-gradient(ellipse,rgba(255,226,165,.22),rgba(255,226,165,.08) 42%,transparent 74%);
  filter:blur(16px);
}
.title p{text-shadow:0 2px 8px rgba(30,22,32,.38),0 0 12px rgba(255,234,174,.18);opacity:.92!important;}
.star:nth-child(3n){width:2px;height:2px;opacity:.72}.star:nth-child(4n){width:4px;height:4px}.star:nth-child(5n){filter:blur(.2px)}
.line{box-shadow:0 0 12px rgba(255,226,161,.12)}
.cloth{filter:drop-shadow(0 4px 3px rgba(36,25,32,.12))}

/* 主角：光晕只包住头肩，脚下阴影更明确，整体从背景中跳出来 */
.person{z-index:55!important;filter:drop-shadow(0 20px 19px rgba(24,17,26,.36)) drop-shadow(0 0 9px rgba(255,223,151,.22))!important;}
.person::before{
  width:178px!important;height:150px!important;left:50%!important;top:24%!important;bottom:auto!important;
  transform:translate(-50%,-50%)!important;border-radius:50%!important;z-index:-2!important;
  background:radial-gradient(ellipse at 50% 45%,rgba(255,218,142,.34) 0%,rgba(255,218,142,.18) 42%,transparent 72%)!important;
  filter:blur(13px)!important;opacity:.9!important;mix-blend-mode:screen;
}
.person::after{
  content:"";position:absolute;left:50%;bottom:-1.8%;width:62%;height:7.5%;transform:translateX(-50%);
  border-radius:50%;background:radial-gradient(ellipse,rgba(21,16,24,.52),rgba(21,16,24,.22) 45%,transparent 72%);
  filter:blur(4px);z-index:-1;pointer-events:none;
}
.app.step-2 .person::before{width:150px!important;height:126px!important;top:23%!important;opacity:.78!important}
.app.step-3 .person::before{width:124px!important;height:104px!important;top:22%!important;opacity:.6!important}
.person svg .helmet-glint{mix-blend-mode:screen;filter:drop-shadow(0 0 4px rgba(255,235,184,.34));animation:glintBreathe 2.8s ease-in-out infinite alternate;}
.person svg .bag-rim{filter:drop-shadow(0 0 3px rgba(255,239,194,.18));}
@keyframes glintBreathe{from{opacity:.58}to{opacity:.94}}

/* 背景三档：近中景清楚，中层柔和，最远灰紫模糊 */
.near-houses,.person-side-houses,.side-house{filter:saturate(1.04) contrast(1.06) drop-shadow(0 18px 24px rgba(33,23,30,.18));}
.near-house,.ps-house,.side-house{opacity:.92!important;}
.near-house .nw,.ps-house .pw,.side-window{filter:brightness(1.08);box-shadow:0 0 24px rgba(255,194,105,.28)!important;}
.mid-houses{opacity:.62!important;filter:blur(.55px) saturate(.9)!important;}
.mid-house{box-shadow:0 18px 30px rgba(35,25,33,.12)!important;}
.alley-depth,.back-shop{opacity:.36!important;filter:blur(1.2px) saturate(.78)!important;}
.distant-houses{opacity:.58!important;filter:blur(1.8px) saturate(.55) hue-rotate(12deg)!important;}
.distant-house{background:linear-gradient(180deg,rgba(154,141,164,.48),rgba(92,72,105,.34))!important;box-shadow:0 12px 28px rgba(27,22,32,.08)!important;}
.distant-house:before{opacity:.36!important}.distant-house:after{opacity:.28!important;filter:blur(.8px)!important;}

/* 左右主房子：侧面暗面、屋檐底阴影、接地感 */
.shop{overflow:visible!important;box-shadow:0 34px 52px rgba(32,22,30,.31),0 8px 0 rgba(36,25,32,.08)!important;}
.shop.left::selection,.shop.right::selection{background:transparent}
.shop.left{background:linear-gradient(90deg,rgba(89,55,65,.34) 0 10%,rgba(255,255,255,.12) 12%,transparent 28%),linear-gradient(180deg,#f2bd85,#c97868)!important;}
.shop.right{background:linear-gradient(270deg,rgba(83,52,66,.36) 0 10%,rgba(255,255,255,.13) 12%,transparent 28%),linear-gradient(180deg,#f2d28f,#b86f70)!important;}
.shop .door{box-shadow:inset 0 0 0 6px rgba(255,226,162,.18),inset 0 -12px 16px rgba(17,13,22,.22),0 8px 16px rgba(31,22,29,.18)!important;}
.window{border-width:5px!important;box-shadow:inset 0 -12px 0 rgba(117,61,65,.18),0 11px 0 rgba(69,45,50,.14),0 16px 25px rgba(255,181,98,.2)!important;}
.shop:before{box-shadow:0 9px 0 rgba(71,45,49,.22),0 15px 22px rgba(35,24,31,.18)!important;transform:translateY(-1px) rotate(-.3deg);}
.shop::after{height:3px!important;background:rgba(45,31,36,.22)!important;box-shadow:0 -70px rgba(60,43,49,.15),0 -142px rgba(60,43,49,.11),0 12px 20px rgba(31,22,28,.18)!important;}
.shop.left .brick-lines,.shop.right .brick-lines{opacity:.32!important;}

/* 石板路：近大远小，远处淡入雾，边缘更自然 */
.road{clip-path:polygon(47.2% 0,52.6% 0,90% 100%,9% 100%)!important;opacity:.82!important;filter:blur(.65px)!important;}
.smooth-path-svg{filter:drop-shadow(0 20px 24px rgba(28,20,28,.2))!important;}
.smooth-path-svg .path-edge{opacity:.68!important;filter:blur(6px)!important;}
.smooth-path-svg .stone{transform-box:fill-box;transform-origin:center;}
.smooth-path-svg .stone:nth-of-type(-n+8){opacity:.24!important;filter:blur(.8px)!important;stroke-width:1.2!important;}
.smooth-path-svg .stone:nth-of-type(n+9):nth-of-type(-n+22){opacity:.62!important;stroke-width:1.8!important;}
.smooth-path-svg .stone:nth-last-of-type(-n+12){opacity:1!important;stroke-width:2.9!important;filter:drop-shadow(0 2px 2px rgba(32,23,30,.16))!important;}
.path-stones span:nth-last-child(-n+10){background:linear-gradient(180deg,rgba(255,226,170,.18),rgba(44,34,38,.18))!important;border-color:rgba(36,27,31,.55)!important;}
.scene::after{
  content:"";position:absolute;left:33%;right:33%;bottom:35.5vh;height:10vh;z-index:9;pointer-events:none;
  background:linear-gradient(180deg,rgba(233,174,115,0),rgba(238,176,116,.13) 42%,rgba(46,36,47,.08));
  filter:blur(12px);
}

/* 招牌：默认可点击语言 + hover 提示 + active 反馈 */
.sign{box-shadow:0 13px 0 rgba(82,50,53,.13),0 18px 30px rgba(50,31,37,.2),0 0 18px rgba(255,226,143,.22)!important;will-change:transform,filter;}
.sign::before{
  content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 10px);transform:translateX(-50%) translateY(4px) scale(.96);
  white-space:nowrap;padding:.42rem .66rem;border-radius:999px;background:rgba(255,244,207,.94);color:#4b3440;
  font-size:.72rem;font-weight:900;letter-spacing:.02em;border:1px solid rgba(69,45,52,.18);box-shadow:0 10px 24px rgba(31,22,29,.2);
  opacity:0;pointer-events:none;transition:.22s ease;
}
.sign::after{content:"";position:absolute;right:-9px;top:-7px;width:10px;height:10px;border-radius:50%;background:#ffe690;box-shadow:0 0 14px rgba(255,226,144,.8),0 0 0 4px rgba(255,226,144,.15);opacity:.95;}
.sign:hover,.sign:focus-visible{transform:translateY(-5px) scale(1.055) rotate(var(--r,-3deg))!important;filter:brightness(1.14) drop-shadow(0 0 12px rgba(255,226,145,.55))!important;}
.sign:hover::before,.sign:focus-visible::before{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
.sign:active{transform:translateY(-1px) scale(1.02) rotate(var(--r,-3deg))!important;}
.scene.sign-bump-left .shop.left,.scene.sign-bump-right .shop.right,.scene.sign-bump-mid .side-house{animation:houseBump .34s cubic-bezier(.2,1.4,.4,1);}
@keyframes houseBump{0%{translate:0 0}42%{translate:0 -5px}70%{translate:0 2px}100%{translate:0 0}}

/* 底部导航融入世界观：主按钮更像手工路牌 */
.controls{bottom:1.6vh!important;padding:.5rem .62rem!important;background:rgba(61,45,52,.38)!important;border:1px solid rgba(255,233,181,.25)!important;box-shadow:0 14px 30px rgba(24,18,26,.22),inset 0 1px 0 rgba(255,240,196,.18)!important;}
.control{border:2px solid rgba(75,49,54,.26)!important;background:linear-gradient(180deg,rgba(255,238,185,.96),rgba(238,183,116,.92))!important;box-shadow:0 5px 0 rgba(79,50,54,.18),0 11px 18px rgba(28,20,27,.16)!important;}
#nextBtn{font-size:1rem;transform:translateY(-2px);background:linear-gradient(180deg,#fff2bf,#ffc979)!important;box-shadow:0 7px 0 rgba(99,59,55,.2),0 0 20px rgba(255,213,128,.28)!important;}
#backBtn{opacity:.82}.control:disabled{opacity:.36!important;filter:saturate(.65)}
.hint{opacity:.72;font-weight:800;background:rgba(38,29,39,.28);border-radius:999px;padding:.45rem .7rem!important;}

/* 前景物件：接地阴影和轻微生命感 */
.object,.cat,.cat2,.vending,.lamp{filter:drop-shadow(0 10px 8px rgba(28,20,27,.2));}
.object::before,.cat::after,.cat2::after{filter:drop-shadow(0 3px 2px rgba(28,20,27,.12));}
.cat{animation:catBlink 4.5s ease-in-out infinite;}
.cat2{animation:catTail 3.2s ease-in-out infinite alternate;}
@keyframes catBlink{0%,92%,100%{filter:drop-shadow(0 10px 8px rgba(28,20,27,.2)) brightness(1)}95%{filter:drop-shadow(0 10px 8px rgba(28,20,27,.2)) brightness(.86)}}
@keyframes catTail{from{transform:translateY(0)}to{transform:translateY(-2px)}}
.vending:before{animation:vendingGlow 2.4s ease-in-out infinite alternate;}
@keyframes vendingGlow{from{filter:brightness(.95);box-shadow:inset 0 -6px rgba(91,69,67,.12),0 0 8px rgba(255,216,137,.12)}to{filter:brightness(1.1);box-shadow:inset 0 -6px rgba(91,69,67,.12),0 0 18px rgba(255,216,137,.32)}}
.plant:before{animation:leafFloat 2.8s ease-in-out infinite alternate;transform-origin:bottom center;}
@keyframes leafFloat{from{translate:0 0}to{translate:0 -2px}}
.box{box-shadow:0 12px 16px rgba(30,22,29,.22),inset -8px 0 0 rgba(69,43,45,.13)!important;}

@media(max-width:760px){
  .person::before{width:128px!important;height:112px!important;filter:blur(11px)!important;}
  .title::before{height:110px}.sign::before{display:none}.controls{bottom:1vh!important}.scene::after{left:22%;right:22%;}
}



/* ===== STRICT PASS: 中景三档纵深 + 左右主房子真实体积 ===== */
/* 目标：不要再像一排半透明板；把街道拆成：近中景 / 中层雾景 / 最远灰紫背景 */
.scene{isolation:isolate;}

/* C. 最远背景：灰紫、虚、淡，窗户细节弱化 */
.distant-houses,
.fill-houses{
  z-index:2!important;
  opacity:.34!important;
  filter:blur(3.2px) saturate(.45) contrast(.72) hue-rotate(14deg)!important;
  transform:translateY(-1.4vh) scale(.96)!important;
}
.distant-house,
.fill-house{
  background:linear-gradient(180deg,rgba(126,111,137,.48),rgba(82,65,91,.34))!important;
  box-shadow:0 10px 22px rgba(28,22,34,.08)!important;
}
.distant-house::before,
.fill-house::before{
  opacity:.28!important;
  filter:grayscale(.55) brightness(.72)!important;
}
.distant-house::after,
.fill-house::after{
  opacity:.20!important;
  filter:blur(2px) saturate(.35)!important;
  box-shadow:none!important;
}
/* 远处建筑错开亮度，避免窗户一排一样亮 */
.dh1::after,.dh6::after{opacity:.10!important;}
.dh2::after,.dh5::after{opacity:.16!important;}
.dh3::after,.dh4::after{opacity:.24!important;}

/* B. 人物正后的中层背景：柔和雾感，透明度中等，做成街道尽头的“雾中建筑” */
.alley-depth,
.back-shop{
  z-index:4!important;
  opacity:.46!important;
  filter:blur(1.75px) saturate(.68) contrast(.82)!important;
}
.alley-depth::after{
  content:"";
  position:absolute;
  left:-8%;right:-8%;top:-8%;bottom:-6%;
  pointer-events:none;
  background:radial-gradient(ellipse at 50% 48%,rgba(255,226,174,.12),transparent 42%),
             linear-gradient(180deg,rgba(207,184,185,.12),rgba(77,62,83,.20));
  filter:blur(10px);
  z-index:5;
}
.back-shop{
  bottom:39.8vh!important;
  transform:scale(.68) translateX(-1.5vw)!important;
  background:linear-gradient(180deg,rgba(210,164,117,.42),rgba(118,81,91,.32))!important;
}
.back-shop::before{opacity:.45!important;filter:saturate(.65) brightness(.88)!important;}
.back-shop::after{opacity:.40!important;filter:blur(.9px) brightness(.92)!important;}

/* A. 靠近人物的中景建筑：更实、更清楚、更有对比，放到人物两侧形成夹道 */
.near-houses,
.person-side-houses{
  z-index:6!important;
  opacity:1!important;
  filter:saturate(1.08) contrast(1.12) drop-shadow(0 22px 22px rgba(31,22,30,.22))!important;
}
.near-house,
.ps-house{
  opacity:.98!important;
  background:linear-gradient(180deg,#efc184 0%,#cb7c6b 58%,#9b5f63 100%)!important;
  box-shadow:0 26px 34px rgba(30,21,29,.24), inset -16px 0 24px rgba(47,31,42,.16), inset 10px 0 16px rgba(255,229,173,.08)!important;
  border:1px solid rgba(255,236,190,.08)!important;
}
.near-house::before,
.ps-house::before{
  opacity:.92!important;
  box-shadow:0 8px 0 rgba(58,39,47,.20),0 16px 20px rgba(36,25,33,.15)!important;
}
.near-house::after,
.ps-house::after{
  opacity:.34!important;
  mix-blend-mode:multiply!important;
}
.near-house .nw,
.ps-house .pw{
  filter:brightness(1.12) saturate(1.06)!important;
  box-shadow:0 0 20px rgba(255,190,104,.34),0 9px 12px rgba(54,35,41,.18)!important;
}
/* 近中景窗户亮度不统一 */
.nh-left-1 .nw.a,.ps-left-1 .pw.w1,.nh-right-2 .nw.b{filter:brightness(1.28) saturate(1.08)!important;}
.nh-left-2 .nw.b,.ps-right-2 .pw.w2{filter:brightness(.9) saturate(.82)!important;opacity:.72!important;}

/* 中景主排：拉开位置和层级，左右更实，中央更雾 */
.mid-houses{
  z-index:5!important;
  left:2.5vw!important;right:2.5vw!important;bottom:24.2vh!important;height:32vh!important;
  opacity:1!important;
  filter:none!important;
}
.mid-house{
  opacity:.72!important;
  filter:blur(.65px) saturate(.82) contrast(.9)!important;
  background:linear-gradient(180deg,rgba(220,173,121,.72),rgba(133,82,91,.58))!important;
  box-shadow:0 16px 24px rgba(35,25,33,.13), inset 0 -18px 26px rgba(45,30,39,.08)!important;
}
.mid-house::before{opacity:.55!important;filter:saturate(.8)!important;}
.mid-house::after{opacity:.42!important;filter:blur(.35px)!important;}
.mid-house .mw{
  opacity:.52!important;
  filter:brightness(.9) saturate(.78)!important;
  box-shadow:0 4px 8px rgba(45,30,38,.12)!important;
}
/* 靠人物两侧的中景房更清楚；正后方保持雾；最边缘更灰虚 */
.mh2,.mh6{
  opacity:.94!important;
  filter:blur(.08px) saturate(1.02) contrast(1.08)!important;
  transform:translateY(1.2vh) scale(1.06)!important;
  background:linear-gradient(180deg,#e9b77f,#bd736b 62%,#8f5a62)!important;
}
.mh2 .mw,.mh6 .mw{opacity:.86!important;filter:brightness(1.14) saturate(1.05)!important;box-shadow:0 0 19px rgba(255,188,100,.28),0 8px 11px rgba(48,32,38,.16)!important;}
.mh3,.mh5{
  opacity:.68!important;
  filter:blur(.9px) saturate(.75) contrast(.84)!important;
  transform:translateY(-.3vh) scale(.94)!important;
}
.mh4{
  opacity:.48!important;
  filter:blur(1.8px) saturate(.62) contrast(.76)!important;
  transform:translateY(-1.6vh) scale(.88)!important;
}
.mh4 .mw{opacity:.22!important;filter:blur(1px) brightness(.72)!important;}
.mh1,.mh7{
  opacity:.38!important;
  filter:blur(2.4px) saturate(.52) contrast(.72) hue-rotate(12deg)!important;
  transform:translateY(-1.2vh) scale(.88)!important;
}
.mh1 .mw,.mh7 .mw{opacity:.16!important;}

/* 中景雾带：只罩中央和远处，避免把近中景也糊成一片 */
.scene::after{
  content:"";
  position:absolute;
  left:12vw;right:12vw;bottom:32vh;height:20vh;
  z-index:5;
  pointer-events:none;
  background:radial-gradient(ellipse at 50% 54%,rgba(255,220,172,.13),transparent 48%),
             linear-gradient(90deg,transparent 0%,rgba(77,64,88,.18) 24%,rgba(238,197,174,.12) 50%,rgba(77,64,88,.18) 76%,transparent 100%);
  filter:blur(12px);
  opacity:.68;
}

/* 左右主房子：外侧暗面、屋檐阴影、底部接触阴影，立体感更强 */
.shop{
  z-index:9!important;
  overflow:visible!important;
  filter:drop-shadow(0 30px 28px rgba(27,18,27,.30))!important;
}
.shop.left{
  background:
    linear-gradient(90deg,rgba(53,34,44,.34) 0 7%,rgba(255,236,185,.10) 8% 21%,transparent 34%),
    linear-gradient(180deg,#f2bd85 0%,#d88a6f 56%,#a76465 100%)!important;
  box-shadow:inset 18px 0 30px rgba(46,29,40,.24),inset -10px 0 22px rgba(255,226,166,.08),0 34px 46px rgba(35,23,31,.30)!important;
}
.shop.right{
  background:
    linear-gradient(270deg,rgba(50,32,43,.36) 0 8%,rgba(255,238,188,.10) 9% 22%,transparent 35%),
    linear-gradient(180deg,#f2d28f 0%,#d58d71 56%,#985d66 100%)!important;
  box-shadow:inset -18px 0 32px rgba(45,29,40,.25),inset 10px 0 22px rgba(255,229,172,.08),0 34px 46px rgba(35,23,31,.30)!important;
}
/* 用现有遮阳棚伪元素加厚屋檐投影 */
.shop::before{
  box-shadow:0 9px 0 rgba(61,39,47,.25),0 18px 22px rgba(38,25,33,.20)!important;
  filter:drop-shadow(0 7px 5px rgba(43,28,35,.16))!important;
}
/* 墙面底部接地感 */
.shop::after{
  height:3px!important;
  bottom:4.5%!important;
  background:rgba(44,30,38,.28)!important;
  box-shadow:0 -70px rgba(50,34,42,.12),0 -142px rgba(50,34,42,.09),0 18px 30px 18px rgba(28,20,28,.25)!important;
}
/* 门窗下沿投影和更厚边框 */
.window{
  border-width:5px!important;
  border-color:rgba(60,40,48,.48)!important;
  box-shadow:inset 0 -12px 0 rgba(135,70,68,.18),0 11px 12px rgba(42,28,36,.20),0 0 24px rgba(255,181,98,.18)!important;
}
.window::after{
  box-shadow:0 9px 8px rgba(47,31,38,.16)!important;
}
.door{
  box-shadow:inset 0 0 0 5px rgba(255,226,162,.17),0 14px 18px rgba(40,27,34,.22)!important;
  border:1px solid rgba(255,230,174,.08)!important;
}
/* 招牌和墙面分离：默认就有厚阴影，像挂出来 */
.sign{
  box-shadow:0 13px 0 rgba(64,40,48,.20),0 20px 26px rgba(38,25,33,.28),0 0 18px rgba(255,225,145,.18)!important;
  filter:drop-shadow(0 6px 4px rgba(37,25,32,.16));
}
.sign:hover{
  box-shadow:0 16px 0 rgba(64,40,48,.19),0 26px 34px rgba(38,25,33,.32),0 0 28px rgba(255,226,148,.36)!important;
}

/* 房子和地面交接的暗带，压住“漂浮平面感” */
.shop.left .brick-lines,
.shop.right .brick-lines{
  box-shadow:inset 0 -42px 38px rgba(48,31,40,.18)!important;
}

@media(max-width:760px){
  .distant-houses,.fill-houses{filter:blur(2.6px) saturate(.48)!important;opacity:.32!important;}
  .mid-houses{left:0!important;right:0!important;height:30vh!important;}
  .mh1,.mh7{display:none!important;}
  .mh2,.mh6{opacity:.88!important;filter:blur(.2px) contrast(1.04)!important;}
  .mh4{opacity:.42!important;filter:blur(1.6px) saturate(.58)!important;}
  .shop.left,.shop.right{box-shadow:0 28px 38px rgba(35,23,31,.28)!important;}
}


/* ===== 12个短标签：每个场景只显示4个 ===== */
.sign[data-sign-slot]{
  width:fit-content!important;
  max-width:max-content!important;
  min-width:0!important;
  display:inline-flex!important;
  align-items:center;
  justify-content:center;
  flex:none!important;
  white-space:nowrap!important;
  padding:.42rem .82rem!important;
  line-height:1!important;
  border-radius:16px!important;
  transition:opacity .85s ease-in-out, transform .85s cubic-bezier(.2,.8,.2,1), left .85s cubic-bezier(.2,.8,.2,1), top .85s cubic-bezier(.2,.8,.2,1)!important;
}
.sign.sign-switching{
  opacity:0!important;
  pointer-events:none!important;
}

/* ===== 木箱三段点击动画：震动、开盖、纸条、小光点 ===== */
.box{
  overflow:visible!important;
  cursor:pointer!important;
  transform-origin:center bottom!important;
  transition:transform .28s ease, filter .28s ease!important;
}
.box .box-lid{
  position:absolute;
  left:3%;
  top:-9%;
  width:94%;
  height:32%;
  border-radius:14px 14px 8px 8px;
  background:linear-gradient(180deg,#d89568,#b87354);
  box-shadow:inset 0 -3px rgba(72,48,52,.16),0 6px 8px rgba(48,30,34,.12);
  transform-origin:left bottom;
  transform:rotate(0deg);
  opacity:.96;
  pointer-events:none;
  transition:transform .48s cubic-bezier(.18,.9,.18,1), top .48s ease;
}
.box .box-note{
  position:absolute;
  left:50%;
  bottom:62%;
  width:max-content;
  max-width:168px;
  min-width:52px;
  padding:.42rem .58rem;
  border-radius:10px;
  background:#fff2c8;
  color:#5b3d42;
  border:2px solid rgba(92,62,56,.28);
  box-shadow:0 10px 18px rgba(45,29,35,.2);
  font-size:clamp(.56rem,.82vw,.76rem);
  font-weight:900;
  letter-spacing:.03em;
  line-height:1.25;
  text-align:center;
  opacity:0;
  transform:translate(-50%,16px) scale(.5) rotate(-5deg);
  pointer-events:none;
  transition:opacity .5s ease, transform .65s cubic-bezier(.2,1.35,.24,1), max-width .45s ease, padding .35s ease;
}
.box .box-spark{
  position:absolute;
  left:50%;
  bottom:84%;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#ffe69a;
  box-shadow:0 0 12px #ffe69a,0 0 28px rgba(255,218,116,.9);
  opacity:0;
  transform:translate(-50%,10px) scale(.4);
  pointer-events:none;
}
.box.shake{
  animation:boxShake .38s ease;
}
@keyframes boxShake{
  0%,100%{transform:rotate(-7deg) translate(0,0)}
  20%{transform:rotate(-9deg) translate(-3px,1px)}
  40%{transform:rotate(-5deg) translate(3px,-1px)}
  60%{transform:rotate(-8deg) translate(-2px,0)}
  80%{transform:rotate(-6deg) translate(2px,1px)}
}
.box.box-step-1 .box-lid,
.box.box-step-2 .box-lid{
  top:-17%;
  transform:rotate(-14deg);
}
.box.box-step-1 .box-note{
  opacity:1;
  transform:translate(-50%,-18px) scale(.88) rotate(-4deg);
  max-width:168px;
}
.box.box-step-2 .box-note{
  opacity:1;
  transform:translate(-50%,-30px) scale(1) rotate(-2deg);
  max-width:196px;
  padding:.5rem .68rem;
}
.box.box-step-3 .box-lid{
  transform:rotate(0deg);
}
.box.box-step-3 .box-note{
  opacity:0;
  transform:translate(-50%,14px) scale(.45) rotate(3deg);
}
.box.box-step-3 .box-spark{
  animation:boxSpark .85s ease forwards;
}
@keyframes boxSpark{
  0%{opacity:0;transform:translate(-50%,10px) scale(.4)}
  25%{opacity:1;transform:translate(-50%,-12px) scale(1)}
  70%{opacity:1;transform:translate(-50%,-36px) scale(.9)}
  100%{opacity:0;transform:translate(-50%,-52px) scale(.25)}
}
@media(max-width:760px){

}


/* ===== 自动售货机三段点击动画：普通饮料 / 云朵饮料 / 疲惫闪烁 ===== */
.vending{
  overflow:visible!important;
  transform-origin:center bottom!important;
}
.vending.vending-bump{
  animation:vendingBump .36s ease;
}
@keyframes vendingBump{
  0%,100%{transform:translateY(0)}
  25%{transform:translateY(-3px) rotate(-1.2deg)}
  55%{transform:translateY(1px) rotate(1deg)}
  78%{transform:translateY(-1px)}
}
.vending .can{
  position:absolute!important;
  left:50%!important;
  bottom:9%!important;
  width:18px!important;
  height:26px!important;
  border-radius:7px 7px 6px 6px!important;
  opacity:0;
  transform:translateX(-50%) translateY(4px) scale(.72) rotate(0deg);
  pointer-events:none;
  transition:none!important;
  box-shadow:inset 0 -5px rgba(84,55,50,.13),0 8px 12px rgba(43,28,34,.18);
}
.vending .drink-normal{
  background:linear-gradient(180deg,#f8d87f,#e7995f)!important;
}
.vending .drink-special{
  width:22px!important;
  height:28px!important;
  border-radius:10px 10px 8px 8px!important;
  background:
    radial-gradient(circle at 35% 36%,rgba(255,255,255,.82) 0 4px,transparent 5px),
    radial-gradient(circle at 58% 43%,rgba(255,255,255,.72) 0 5px,transparent 6px),
    linear-gradient(180deg,#d9f2ff,#8fcbe1)!important;
  box-shadow:0 0 18px rgba(178,230,255,.8), inset 0 -5px rgba(70,112,130,.15),0 8px 12px rgba(43,28,34,.18)!important;
}
.vending .vending-flash{
  position:absolute;
  inset:-8%;
  border-radius:22px;
  background:radial-gradient(circle at 50% 35%,rgba(255,245,180,.7),transparent 58%);
  opacity:0;
  pointer-events:none;
}
.vending.drop-normal .drink-normal{
  animation:drinkDropNormal .78s cubic-bezier(.2,1.25,.25,1) forwards;
}
.vending.drop-special .drink-special{
  animation:drinkDropSpecial .92s cubic-bezier(.2,1.25,.25,1) forwards;
}
.vending.tired-flash .vending-flash{
  animation:vendingTiredFlash .65s ease forwards;
}
@keyframes drinkDropNormal{
  0%{opacity:0;transform:translateX(-50%) translateY(0) scale(.55) rotate(-8deg)}
  35%{opacity:1;transform:translateX(-50%) translateY(28px) scale(1) rotate(10deg)}
  72%{opacity:1;transform:translateX(-50%) translateY(48px) scale(1) rotate(18deg)}
  100%{opacity:0;transform:translateX(-50%) translateY(58px) scale(.86) rotate(22deg)}
}
@keyframes drinkDropSpecial{
  0%{opacity:0;transform:translateX(-50%) translateY(0) scale(.5) rotate(8deg)}
  30%{opacity:1;transform:translateX(-50%) translateY(25px) scale(1.05) rotate(-12deg)}
  58%{opacity:1;transform:translateX(-50%) translateY(43px) scale(1) rotate(-20deg)}
  78%{opacity:1;transform:translateX(-50%) translateY(38px) scale(1.04) rotate(-16deg)}
  100%{opacity:0;transform:translateX(-50%) translateY(56px) scale(.82) rotate(-12deg)}
}
@keyframes vendingTiredFlash{
  0%,100%{opacity:0}
  18%{opacity:.75}
  36%{opacity:.1}
  55%{opacity:.55}
  75%{opacity:.08}
}


/* ===== 木箱旁边对话气泡式纸条 ===== */
.box .box-note{
  left:108% !important;
  bottom:54% !important;
  transform:translate(12px,6px) scale(.55) rotate(-2deg) !important;

  max-width:168px !important;
  min-width:88px !important;

  border-radius:16px !important;

  background:#fff2c8 !important;

  box-shadow:
    0 10px 18px rgba(45,29,35,.2),
    0 2px 0 rgba(90,64,57,.08) !important;

  transform-origin:left bottom !important;
}

/* 小尾巴 */
.box .box-note::after{
  content:"";
  position:absolute;
  left:-10px;
  bottom:16px;

  width:18px;
  height:18px;

  background:#fff2c8;

  border-left:2px solid rgba(92,62,56,.28);
  border-bottom:2px solid rgba(92,62,56,.28);

  transform:rotate(45deg);
  border-radius:0 0 0 4px;
}

.box.box-step-1 .box-note{
  opacity:1 !important;
  transform:translate(0,-4px) scale(.92) rotate(-1deg) !important;
}

.box.box-step-2 .box-note{
  opacity:1 !important;
  transform:translate(0,-12px) scale(1) rotate(0deg) !important;
}

.box.box-step-3 .box-note{
  opacity:0 !important;
  transform:translate(10px,10px) scale(.45) rotate(4deg) !important;
}

@media(max-width:760px){
  .box .box-note{
    left:96% !important;
    bottom:58% !important;
    max-width:122px !important;
  }
}

/* ===== 自动售货机文字框：移到右侧空墙位置，大小紧贴文字 ===== */
.vending .vending-flash{
  inset:auto !important;
  top:auto !important;
  right:auto !important;
  left:calc(100% + 12px) !important;
  bottom:10% !important;

  width:max-content !important;
  height:auto !important;
  max-width:160px;
  min-width:0 !important;

  padding:.34rem .56rem;
  background:#fff2c8;
  color:#5b3d42;
  border:2px solid rgba(92,62,56,.28);
  border-radius:14px;
  text-align:center;
  font-weight:700;
  font-size:clamp(.54rem,.78vw,.72rem);
  line-height:1.2;
  white-space:normal;

  opacity:0;
  transform:translate(0,4px) scale(.58) rotate(-1deg);
  pointer-events:none;
  box-shadow:0 8px 14px rgba(45,29,35,.16);
  transition:opacity .45s ease, transform .55s cubic-bezier(.2,1.25,.24,1);
}
.vending.drop-normal .vending-flash,
.vending.drop-special .vending-flash,
.vending.tired-flash .vending-flash{
  opacity:1 !important;
}
.vending.drop-normal .vending-flash{
  transform:translate(0,-2px) scale(1) rotate(-1deg) !important;
}
.vending.drop-special .vending-flash{
  transform:translate(0,-8px) scale(1) rotate(0deg) !important;
}
.vending.tired-flash .vending-flash{
  transform:translate(0,2px) scale(1) rotate(1deg) !important;
}
@media(max-width:760px){
  .vending .vending-flash{
    left:calc(100% + 8px) !important;
    bottom:12% !important;
    max-width:118px;
    padding:.3rem .48rem;
    font-size:.56rem;
  }
}

<script>
  const app = document.getElementById("app");
  const person = document.getElementById("person");
  const backBtn = document.getElementById("backBtn");
  const nextBtn = document.getElementById("nextBtn");
  const statusText = document.getElementById("statusText");
  const bubble = document.getElementById("bubble");


  const stepSignGroups = [
    [
      { text:"MOON",  href:"#",    x:"11vw", y:"24vh", r:"-3deg" },
      { text:"KIOSK", href:"#",     x:"68vw", y:"21vh", r:"4deg" },
      { text:"CLOUD", href:"#", x:"15vw", y:"56vh", r:"2deg" },
      { text:"LAMP",  href:"#", x:"72vw", y:"55vh", r:"-2deg" }
    ],
    [
      { text:"RAIN",  href:"#", x:"8vw",  y:"35vh", r:"3deg" },
      { text:"SHOP",  href:"#", x:"58vw", y:"29vh", r:"-4deg" },
      { text:"CAT",   href:"#",    x:"24vw", y:"62vh", r:"-1deg" },
      { text:"DOOR",  href:"#",     x:"76vw", y:"47vh", r:"2deg" }
    ],
    [
      { text:"STAR",  href:"page1.html", x:"14vw", y:"20vh", r:"-2deg" },
      { text:"GLOW",  href:"page2.html", x:"64vw", y:"34vh", r:"3deg" },
      { text:"TEA",   href:"#", x:"21vw", y:"50vh", r:"1deg" },
      { text:"DUSK",  href:"#",     x:"70vw", y:"61vh", r:"-3deg" }
    ]
  ];

  const stepSigns = Array.from(document.querySelectorAll(".sign[data-sign-slot]"));
  let signSwitchTimer = null;
  let signSwitchToken = 0;

  function applyStepSigns(targetStep, immediate = false){
    const group = stepSignGroups[targetStep - 1] || stepSignGroups[0];
    const token = ++signSwitchToken;
    clearTimeout(signSwitchTimer);

    stepSigns.forEach(sign => {
      sign.classList.add("sign-switching");
    });

    const update = () => {
      if (token !== signSwitchToken) return;

      stepSigns.forEach((sign, index) => {
        const item = group[index];
        if (!item) return;
        sign.textContent = item.text.trim();
        sign.href = item.href || "#";
        sign.style.left = item.x;
        sign.style.top = item.y;
        sign.style.setProperty("--r", item.r);
        sign.style.transform = "rotate(" + item.r + ")";
      });

      requestAnimationFrame(() => {
        if (token !== signSwitchToken) return;
        stepSigns.forEach(sign => sign.classList.remove("sign-switching"));
      });
    };

    if (immediate) update();
    else signSwitchTimer = setTimeout(update, 650);
  }

  const box = document.querySelector(".box");
  let boxClickState = 0;
  const boxLines = [
    "木箱里像藏着谁留下的便条。",
    "月亮小亭今晚会发光。"
  ];

  function resetBoxAnimationClasses(){
    if (!box) return;
    box.classList.remove("shake","box-step-1","box-step-2","box-step-3","open");
    void box.offsetWidth;
  }

  function playBoxAction(){
    if (!box) return;
    const note = box.querySelector(".box-note");
    boxClickState = (boxClickState + 1) % 3;

    resetBoxAnimationClasses();
    box.classList.add("shake");

    if (boxClickState === 1) {
      note.textContent = boxLines[0];
      box.classList.add("open","box-step-1");
      vending.querySelector(".vending-flash").textContent = boxLines[0];
    } else if (boxClickState === 2) {
      note.textContent = boxLines[1];
      box.classList.add("open","box-step-2");
      vending.querySelector(".vending-flash").textContent = "纸条展开了。";
    } else {
      note.textContent = "";
      box.classList.add("box-step-3");
      vending.querySelector(".vending-flash").textContent = "一颗小光点从箱子里飘出来。";
      setTimeout(() => {
        box.classList.remove("shake","box-step-1","box-step-2","box-step-3","open");
      }, 900);
    }

    setTimeout(() => box.classList.remove("shake"), 430);
  }

  box?.addEventListener("click", playBoxAction);
  box?.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      playBoxAction();
    }
  });


  let step = 1;
  let walkTimer = null;
  let bubbleTimer = null;

  function setStep(value){
    step = Math.max(1, Math.min(3, value));
    app.className = "app step-" + step;
    statusText.textContent = "场景 " + step + " / 3";
    backBtn.disabled = step === 1;
    nextBtn.disabled = step === 3;
    applyStepSigns(step);

    person.classList.add("walking");
    clearTimeout(walkTimer);
    walkTimer = setTimeout(() => {
      if (step === 1 || step === 3) person.classList.remove("walking");
    }, 900);
  }

  function forward(){ if(step < 3) setStep(step + 1); }
  function backward(){ if(step > 1) setStep(step - 1); }

  function showBubble(text){
    bubble.textContent = text;
    bubble.classList.add("show");
    clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(() => bubble.classList.remove("show"), 1350);
  }

  person.addEventListener("click", e => { e.stopPropagation(); forward(); });
  nextBtn.addEventListener("click", e => { e.stopPropagation(); forward(); });
  backBtn.addEventListener("click", e => { e.stopPropagation(); backward(); });

  app.addEventListener("click", e => {
    if(e.target.closest("a, button, .interactive, .object, .cat, .cat2, .npc")) return;
    forward();
  });

  app.addEventListener("pointermove", e => {
    const x = (e.clientX / window.innerWidth - .5) * 10;
    const y = (e.clientY / window.innerHeight - .5) * 7;
    app.style.setProperty("--mx", `${x}px`);
    app.style.setProperty("--my", `${y}px`);
  });

  const stars = document.getElementById("stars");
  const starPositions = [
    [10,14],[18,22],[27,13],[35,28],[49,18],[62,25],[74,12],[84,21],[91,15],[57,9],
    [15,33],[71,34],[42,8],[88,32]
  ];
  starPositions.forEach(([x,y], i) => {
    const s = document.createElement("span");
    s.className = "star";
    s.style.left = x + "%";
    s.style.top = y + "%";
    s.style.animationDelay = (i * .17) + "s";
    stars.appendChild(s);
    s.addEventListener("click", () => showBubble("星星闪了一下"));
  });

  document.querySelectorAll(".window").forEach(win => {
    win.addEventListener("click", e => {
      e.stopPropagation();
      win.classList.toggle("lit");
      showBubble(win.dataset.msg || "窗户亮了");
    });
  });

  document.querySelectorAll(".npc").forEach(npc => {
    npc.addEventListener("click", e => {
      e.stopPropagation();
      npc.style.bottom = (parseFloat(getComputedStyle(npc).bottom) + 8) + "px";
      setTimeout(() => npc.style.bottom = "", 500);
      showBubble(npc.dataset.msg || "路人和你打了个招呼");
    });
  });

  document.getElementById("lamp").addEventListener("click", e => {
    e.stopPropagation();
    e.currentTarget.classList.toggle("off");
    showBubble("路灯被你切换了");
  });

  document.getElementById("vending").addEventListener("click", e => {
    e.stopPropagation();
    const el = e.currentTarget;
    el.classList.remove("drop");
    void el.offsetWidth;
    el.classList.add("drop");
    vending.querySelector(".vending-flash").textContent = "叮咚，掉出一罐饮料";
  });

  document.getElementById("cat").addEventListener("click", e => {
    e.stopPropagation();
    e.currentTarget.classList.toggle("walk");
    showBubble("黑猫换了个位置");
  });

  document.getElementById("cat2").addEventListener("click", e => {
    e.stopPropagation();
    e.currentTarget.classList.toggle("move");
    showBubble("橘猫伸了个懒腰");
  });

  document.getElementById("paper").addEventListener("click", e => {
    e.stopPropagation();
    const el = e.currentTarget;
    el.classList.remove("fly");
    void el.offsetWidth;
    el.classList.add("fly");
    showBubble("传单被风吹起来");
  });

  document.getElementById("puddle").addEventListener("click", e => {
    e.stopPropagation();
    const el = e.currentTarget;
    el.classList.remove("ripple");
    void el.offsetWidth;
    el.classList.add("ripple");
    showBubble("水洼泛起一圈光");
  });

  document.getElementById("plant").addEventListener("click", e => {
    e.stopPropagation();
    e.currentTarget.classList.toggle("grow");
    showBubble("盆栽长精神了");
  });

  // 木箱使用下方三段动画逻辑，保持当前侧边文本效果。


  /* final interaction polish */
  const signTips = {
    story: "进入故事店",
    lab: "探索奇怪实验室",
    moon: "进入月亮小亭",
    archive: "查看奇妙档案"
  };
  document.querySelectorAll(".sign").forEach(sign => {
    const key = ["story","lab","moon","archive"].find(k => sign.classList.contains(k));
    if (key) sign.setAttribute("data-tip", signTips[key]);
    sign.addEventListener("click", (e) => {
      const href = sign.getAttribute("href") || "#";
      if (href && href !== "#") {
        e.stopPropagation();
        return;
      }
      e.preventDefault();
      e.stopPropagation();
      showBubble((sign.textContent || "小招牌").trim() + " 只是闪了一下，没有跳转");
    });
    sign.addEventListener("pointerdown", () => {
      const scene = document.getElementById("scene");
      const cls = key === "story" || key === "moon" ? "sign-bump-left" : key === "lab" || key === "archive" ? "sign-bump-right" : "sign-bump-mid";
      scene.classList.remove("sign-bump-left","sign-bump-right","sign-bump-mid");
      void scene.offsetWidth;
      scene.classList.add(cls);
      setTimeout(() => scene.classList.remove(cls), 420);
    });
  });


  const vending = document.getElementById("vending") || document.querySelector(".vending");
  let vendingClickState = 0;

  function resetVendingAction(){
    if (!vending) return;
    vending.classList.remove("drop","drop-normal","drop-special","tired-flash","vending-bump");
    void vending.offsetWidth;
  }

  function playVendingAction(){
    if (!vending) return;
    vendingClickState = (vendingClickState + 1) % 3;
    resetVendingAction();
    vending.classList.add("vending-bump");

    if (vendingClickState === 1) {
      vending.classList.add("drop-normal");
      vending.querySelector(".vending-flash").textContent = "叮咚，掉出一罐饮料";
    } else if (vendingClickState === 2) {
      vending.classList.add("drop-special");
      vending.querySelector(".vending-flash").textContent = "今天是云朵口味";
    } else {
      vending.classList.add("tired-flash");
      vending.querySelector(".vending-flash").textContent = "它今天好像有点累了";
    }

    setTimeout(() => {
      vending.classList.remove("vending-bump","drop-normal","drop-special","tired-flash","drop");
    }, 1050);
  }

  vending?.addEventListener("click", playVendingAction);
  vending?.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      playVendingAction();
    }
  });


  setStep(1);
  applyStepSigns(1, true);
</script>
</body>
</html>
