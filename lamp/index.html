<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>凌晨街道 · 普通人生模拟器</title>
<style>
:root{
  --cream:#fff0c8;--ink:#3d3349;--glass:rgba(255,240,216,.72);--glassDark:rgba(52,43,69,.62);
  --pink:#ef8796;--green:#8ed0a7;--gold:#f2c36f;--blue:#8fcad2;--violet:#9b87bd;
  --world-hue:0deg;--world-sat:1;--world-bright:1;--rainOpacity:0;--fogOpacity:.25;
}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Trebuchet MS","Microsoft YaHei",system-ui,sans-serif;color:var(--ink);background:#211e35;user-select:none}.game{position:relative;width:100vw;height:100vh;overflow:hidden;filter:hue-rotate(var(--world-hue)) saturate(var(--world-sat)) brightness(var(--world-bright));background:radial-gradient(circle at 50% 18%,#77637c 0,#4b435f 36%,#292641 78%,#18172a 100%)}
.sky{position:absolute;inset:0;background:linear-gradient(#22243d 0%,#47415d 43%,#9f7d6c 72%,#322845 100%);animation:skyDrift 18s ease-in-out infinite alternate}.moon{position:absolute;right:26%;top:9%;width:48px;height:48px;border-radius:50%;background:#ffeab0;box-shadow:0 0 32px #ffe5a5,0 0 90px rgba(255,230,180,.25);animation:moonBreathe 6s ease-in-out infinite}.moon:after{content:"";position:absolute;left:14px;top:-4px;width:44px;height:44px;border-radius:50%;background:#44405b}.stars i{position:absolute;width:3px;height:3px;background:#ffe8ad;border-radius:50%;box-shadow:0 0 10px #ffeab1;animation:twinkle 2.6s infinite alternate}.stars i:nth-child(1){left:10%;top:16%}.stars i:nth-child(2){left:20%;top:10%;animation-delay:.4s}.stars i:nth-child(3){left:77%;top:13%;animation-delay:1s}.stars i:nth-child(4){left:88%;top:21%;animation-delay:.7s}.stars i:nth-child(5){left:61%;top:18%;animation-delay:.2s}.stars i:nth-child(6){left:42%;top:20%;animation-delay:1.2s}.stars i:nth-child(7){left:33%;top:25%;animation-delay:1.8s}.stars i:nth-child(8){left:70%;top:24%;animation-delay:.9s}@keyframes twinkle{to{opacity:.22;transform:scale(.5)}}@keyframes moonBreathe{50%{box-shadow:0 0 48px #ffe5a5,0 0 125px rgba(255,230,180,.34)}}@keyframes skyDrift{to{transform:translateX(-1.2%) translateY(.8%)}}
.cloud{position:absolute;width:260px;height:56px;border-radius:999px;background:rgba(255,226,196,.12);filter:blur(8px);animation:cloudMove 55s linear infinite}.cloud.c1{left:-20%;top:18%}.cloud.c2{left:48%;top:26%;width:340px;animation-duration:70s;opacity:.55}.cloud.c3{left:15%;top:8%;width:190px;animation-duration:64s;opacity:.35}@keyframes cloudMove{to{transform:translateX(135vw)}}
.city{position:absolute;left:-4%;right:-4%;bottom:28%;height:42%;opacity:.55;filter:blur(1.7px);animation:farFloat 12s ease-in-out infinite alternate}.tower{position:absolute;bottom:0;width:70px;background:rgba(31,28,49,.55);border-radius:8px 8px 0 0}.tower:before{content:"";position:absolute;inset:16px 12px;background:repeating-linear-gradient(90deg,rgba(255,225,165,.2) 0 10px,transparent 10px 22px)}.fog{position:absolute;left:-10%;right:-10%;bottom:26%;height:30%;background:radial-gradient(ellipse at 30% 50%,rgba(255,226,197,.35),transparent 60%),radial-gradient(ellipse at 80% 40%,rgba(180,210,230,.24),transparent 55%);filter:blur(14px);opacity:var(--fogOpacity);animation:fogFlow 18s ease-in-out infinite alternate;pointer-events:none}@keyframes farFloat{to{transform:translateY(-8px) translateX(8px)}}@keyframes fogFlow{to{transform:translateX(4%)}}
.street{position:absolute;left:-6%;right:-6%;bottom:-5%;height:48%;background:radial-gradient(ellipse at 50% 0,#e5b57d 0,#c58b6b 47%,#5c4260 100%);border-radius:50% 50% 0 0/18% 18% 0 0}.street:after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0 35%,rgba(255,230,180,.18) 45%,transparent 60%),radial-gradient(ellipse at 62% 35%,rgba(255,255,255,.16),transparent 34%);mix-blend-mode:screen;opacity:.7}.road{position:absolute;left:40%;bottom:0;width:20%;height:48%;background:linear-gradient(#bb9071,#775368);clip-path:polygon(42% 0,58% 0,100% 100%,0 100%);opacity:.82}.road:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 22px,rgba(255,226,170,.08) 22px 25px);opacity:.35}.stone{position:absolute;width:48px;height:20px;border:2px solid rgba(61,48,61,.32);border-radius:50%;opacity:.5}.string{position:absolute;left:15%;right:15%;top:21%;height:50px;border-top:3px solid rgba(43,37,54,.45);transform:rotate(-3deg)}.bulb{position:absolute;top:-8px;width:27px;height:20px;border-radius:8px;background:#ffe293;box-shadow:0 0 22px #ffc777;animation:sway 3s ease-in-out infinite}.bulb:nth-child(1){left:10%;background:#f08a7b}.bulb:nth-child(2){left:33%;background:#d9efaa;animation-delay:.4s}.bulb:nth-child(3){left:58%;animation-delay:.8s}.bulb:nth-child(4){left:82%;background:#f2a1a0;animation-delay:1.1s}@keyframes sway{50%{transform:translateY(4px);filter:brightness(1.2)}}
.lamp{position:absolute;left:37%;top:31%;width:14px;height:320px;background:#332b46;border-radius:8px;cursor:pointer;z-index:3}.lamp:before{content:"";position:absolute;left:-25px;top:-55px;width:68px;height:68px;border-radius:50%;background:#322b45;border:6px solid #675270}.lamp:after{content:"";position:absolute;left:-8px;top:-37px;width:36px;height:36px;border-radius:50%;background:#ffe0a0;box-shadow:0 0 30px #ffca77;animation:glow 4.8s ease-in-out infinite}.lamp.flicker:after{animation:flicker .22s steps(2) 5}.lampCone{position:absolute;left:30%;top:28%;width:260px;height:430px;background:radial-gradient(ellipse at 50% 0,rgba(255,211,135,.24),transparent 66%);filter:blur(12px);transform:rotate(4deg);pointer-events:none;animation:coneBreathe 5s ease-in-out infinite}@keyframes glow{50%{box-shadow:0 0 64px #ffca77}}@keyframes flicker{50%{filter:brightness(.35);box-shadow:0 0 8px #ffca77}}@keyframes coneBreathe{50%{opacity:.62;transform:rotate(4deg) scale(1.05)}}
.building{position:absolute;bottom:16%;width:28%;height:43%;border-radius:20px 20px 10px 10px;background:linear-gradient(#e6aa76,#b66b6e);box-shadow:0 20px 40px rgba(35,24,41,.35);cursor:pointer;transition:.25s;animation:buildingBreath 7s ease-in-out infinite}.building:hover{transform:translateY(-8px);filter:brightness(1.08)}.left{left:4%}.right{right:4%;animation-delay:1.2s}.studio{left:20%;width:16%;height:32%;bottom:21%;background:linear-gradient(#d2a073,#8a5a68);animation-delay:.5s}.cafe{right:21%;width:17%;height:34%;bottom:21%;background:linear-gradient(#d79a7b,#8a5c72);animation-delay:1.8s}@keyframes buildingBreath{50%{transform:translateY(-3px)}}.awning{position:absolute;left:0;right:0;top:0;height:58px;border-radius:20px 20px 8px 8px;background:repeating-linear-gradient(90deg,#fff1bf 0 42px,#ec7868 42px 84px);box-shadow:0 8px 10px rgba(48,33,44,.25)}.sign{position:absolute;left:50%;top:28px;transform:translateX(-50%);padding:10px 26px;border-radius:14px;background:rgba(86,61,72,.75);color:#fff1c8;font-size:27px;font-weight:900;box-shadow:0 8px 15px rgba(0,0,0,.25);animation:signBuzz 6s ease-in-out infinite}.window{position:absolute;border:6px solid rgba(89,68,75,.5);background:linear-gradient(#ffe2a5,#ffa967);box-shadow:0 0 25px #ffd28a;border-radius:15px;animation:windowGlow 4s infinite}.w1{left:12%;top:36%;width:32%;height:28%}.w2{right:12%;top:42%;width:28%;height:22%}.door{position:absolute;bottom:0;left:42%;width:25%;height:38%;background:#4b3152;border-radius:12px 12px 0 0}.chalk{position:absolute;bottom:5%;left:12%;padding:12px 18px;border-radius:10px;background:#543d56;color:#fff0c8;font-weight:700;font-size:18px;box-shadow:0 8px 15px rgba(0,0,0,.18)}.plant{position:absolute;bottom:0;right:8%;width:44px;height:54px;background:#c97954;border-radius:7px}.plant:before{content:"";position:absolute;left:-12px;top:-24px;width:28px;height:28px;background:#6eb073;border-radius:50%;box-shadow:28px -10px 0 #78bd7a,50px 3px 0 #62a768}@keyframes windowGlow{50%{filter:brightness(1.24)}}@keyframes signBuzz{50%{filter:brightness(1.12);transform:translateX(-50%) rotate(.3deg)}}
.cat{position:absolute;left:31%;bottom:19%;width:58px;height:34px;background:#423148;border-radius:50% 50% 45% 45%;cursor:pointer;animation:catNap 2.8s ease-in-out infinite;z-index:4}.cat:before,.cat:after{content:"";position:absolute;top:-15px;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:20px solid #423148}.cat:before{left:9px}.cat:after{right:9px}@keyframes catNap{50%{transform:translateY(3px) scaleX(1.06)}}.vending{position:absolute;right:31%;bottom:23%;width:92px;height:160px;background:#75aaa6;border-radius:16px;box-shadow:0 12px 24px rgba(0,0,0,.25),0 0 35px rgba(155,238,230,.18);cursor:pointer;animation:vendingLight 2.5s infinite;z-index:4}.vending:before{content:"";position:absolute;left:20px;top:24px;width:52px;height:60px;background:linear-gradient(#fff6c4,#ffc084);border-radius:10px;box-shadow:0 0 18px #ffe0a2}.vending:after{content:"";position:absolute;left:25px;bottom:25px;width:44px;height:24px;background:#3c3048;border-radius:6px}@keyframes vendingLight{50%{filter:brightness(1.18)}}
.hero{position:absolute;left:50%;bottom:20%;transform:translateX(-50%);width:120px;height:260px;cursor:pointer;animation:float 3s ease-in-out infinite;z-index:5;filter:drop-shadow(0 0 14px rgba(255,208,150,.2))}.head{position:absolute;left:16px;top:0;width:88px;height:88px;background:#312947;border:12px solid #252039;border-radius:50%;box-shadow:inset 12px 8px 0 rgba(255,255,255,.18),0 0 10px rgba(255,230,170,.28)}.body{position:absolute;left:22px;top:78px;width:76px;height:120px;background:#f49a66;border-radius:40px 40px 22px 22px;animation:cloth 2.8s ease-in-out infinite}.body:after{content:"";position:absolute;left:18px;top:10px;width:40px;height:92px;background:#91cfbd;border-radius:24px;border:6px solid rgba(255,240,190,.65)}.leg{position:absolute;bottom:8px;width:29px;height:80px;background:#333071;border-radius:12px}.l1{left:31px;transform:rotate(3deg)}.l2{right:31px;transform:rotate(-3deg)}.foot{position:absolute;bottom:0;width:50px;height:25px;background:#252039;border-radius:50%}.f1{left:18px}.f2{right:18px}@keyframes float{50%{transform:translateX(-50%) translateY(-8px)}}@keyframes cloth{50%{border-radius:36px 42px 26px 20px}}
.rainLayer{position:absolute;inset:0;pointer-events:none;opacity:var(--rainOpacity);background:repeating-linear-gradient(105deg,rgba(230,240,255,.25) 0 1px,transparent 1px 9px);animation:rainMove .5s linear infinite;z-index:6}.rainLayer:after{content:"";position:absolute;left:0;right:0;bottom:0;height:45%;background:radial-gradient(ellipse at 55% 62%,rgba(255,255,255,.22),transparent 35%);filter:blur(5px)}@keyframes rainMove{to{background-position:0 28px}}
.grain{position:absolute;inset:0;pointer-events:none;z-index:30;opacity:.14;background-image:radial-gradient(rgba(255,255,255,.45) .6px,transparent .6px);background-size:4px 4px;mix-blend-mode:soft-light}.top{position:absolute;top:2%;left:2%;right:2%;display:flex;justify-content:space-between;align-items:flex-start;z-index:20}.title{text-align:center;color:#fff0c5;text-shadow:0 6px 24px rgba(255,228,160,.5)}.title h1{font-size:58px;margin:8px 0 0;letter-spacing:5px}.title p{font-size:18px;font-weight:700;margin:8px}.panel{background:var(--glassDark);border:1px solid rgba(255,238,210,.24);border-radius:24px;padding:16px 20px;color:#fff0c8;box-shadow:0 15px 35px rgba(0,0,0,.2);backdrop-filter:blur(14px)}.stats{width:286px}.row{display:flex;align-items:center;gap:8px;margin:8px 0;font-weight:800}.bar{flex:1;height:13px;background:rgba(255,255,255,.18);border-radius:20px;overflow:hidden}.fill{height:100%;border-radius:20px;transition:width .6s ease}.date{font-size:20px;text-align:center}.toolBtn{border:0;border-radius:999px;background:rgba(255,240,205,.22);color:#fff0c8;padding:6px 10px;font-weight:900;cursor:pointer;margin-top:8px}.choiceBar{position:absolute;left:50%;bottom:2%;transform:translateX(-50%);width:88%;z-index:22;background:var(--glass);border:1px solid rgba(255,255,255,.28);border-radius:24px;padding:16px;box-shadow:0 -10px 35px rgba(58,39,58,.25);backdrop-filter:blur(15px);animation:uiBreathe 5s ease-in-out infinite}.question{text-align:center;font-size:23px;font-weight:900;margin-bottom:12px}.choices{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.choice{position:relative;overflow:hidden;border:0;border-radius:16px;padding:13px 8px;background:linear-gradient(#fff5d4,#eecda9);box-shadow:0 7px 0 rgba(117,78,72,.2);font-size:16px;font-weight:900;color:#4a3651;cursor:pointer;transition:.18s}.choice:hover{transform:translateY(-5px);filter:brightness(1.03)}.choice:active{transform:translateY(2px);box-shadow:0 3px 0 rgba(117,78,72,.25)}.choice:after{content:"";position:absolute;inset:auto auto 50% 50%;width:10px;height:10px;background:rgba(255,255,255,.45);border-radius:50%;transform:scale(0);opacity:0}.choice:active:after{animation:ripple .55s ease-out}@keyframes ripple{to{transform:scale(28);opacity:0}}@keyframes uiBreathe{50%{box-shadow:0 -14px 42px rgba(255,210,160,.22)}}
.toast{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.95);width:min(640px,90vw);background:rgba(255,239,213,.96);border:1px solid rgba(255,255,255,.55);border-radius:28px;padding:26px;z-index:60;box-shadow:0 25px 80px rgba(0,0,0,.35);display:none;backdrop-filter:blur(16px)}.toast.show{display:block;animation:pop .25s}.toast h2{margin:0 0 12px;font-size:28px}.toast p{line-height:1.75;font-size:18px;white-space:pre-line}.toast button,.eventBtn{width:100%;border:0;border-radius:16px;background:#75566d;color:#fff0c8;padding:14px;font-size:18px;font-weight:900;cursor:pointer;margin-top:10px}.eventBtn{background:#9b6e7a}@keyframes pop{from{opacity:0;transform:translate(-50%,-45%) scale(.9)}}.log{position:absolute;left:2%;bottom:23%;width:28%;max-height:190px;overflow:auto;z-index:20;background:rgba(255,238,210,.72);border-radius:22px;padding:16px;box-shadow:0 15px 30px rgba(0,0,0,.15);backdrop-filter:blur(12px)}.log h3{margin:0 0 8px}.log div{font-size:14px;margin:6px 0;padding-bottom:6px;border-bottom:1px dashed rgba(80,55,70,.25)}.ending{position:absolute;right:2%;bottom:23%;width:28%;z-index:20;background:rgba(255,238,210,.72);border-radius:22px;padding:18px;box-shadow:0 15px 30px rgba(0,0,0,.15);backdrop-filter:blur(12px)}.ending h3{margin:0 0 8px}.badge{display:inline-block;background:#75566d;color:#fff0c8;border-radius:999px;padding:7px 10px;margin:5px;font-size:13px;font-weight:800}.hint{position:absolute;left:50%;bottom:17%;transform:translateX(-50%);z-index:20;background:rgba(72,55,78,.68);color:#fff0c8;border-radius:20px;padding:12px 24px;font-weight:900;backdrop-filter:blur(8px)}.smallbubble{position:absolute;z-index:70;background:#fff0c8;color:#5d4559;border-radius:18px;padding:12px 16px;box-shadow:0 10px 20px rgba(0,0,0,.2);font-weight:900;display:none}.floatingText{position:absolute;z-index:12;color:rgba(255,241,205,.48);font-weight:700;font-size:18px;text-shadow:0 0 18px rgba(255,230,180,.35);animation:floatText 12s linear forwards;pointer-events:none}.petal{position:absolute;width:12px;height:8px;background:#ffc2bd;border-radius:50%;animation:fall 5s linear forwards;z-index:50}.meteor{position:absolute;width:140px;height:3px;background:linear-gradient(90deg,#fff8be,transparent);box-shadow:0 0 15px #fff1aa;transform:rotate(-25deg);animation:meteor 1.2s linear forwards;z-index:8}.achievement{position:absolute;right:2%;top:18%;z-index:80;background:rgba(255,240,200,.94);border-radius:18px;padding:14px 18px;box-shadow:0 15px 45px rgba(0,0,0,.25);font-weight:900;animation:achieve 3.2s ease forwards}.cosmos .sky{background:radial-gradient(circle at 50% 20%,#6a5ca9 0,#242244 45%,#080912 100%)}.cosmos .building.right{box-shadow:0 0 55px rgba(160,210,255,.35)}@keyframes floatText{from{opacity:0;transform:translateY(20px)}15%{opacity:1}to{opacity:0;transform:translateY(-130px) translateX(80px)}}@keyframes fall{to{transform:translateY(105vh) rotate(420deg);opacity:0}}@keyframes meteor{from{right:-10%;top:12%;opacity:1}to{right:85%;top:50%;opacity:0}}@keyframes achieve{0%{opacity:0;transform:translateX(40px)}15%,80%{opacity:1;transform:none}to{opacity:0;transform:translateX(30px)}}@media(max-width:900px){.title h1{font-size:34px}.title p{font-size:14px}.choices{grid-template-columns:repeat(2,1fr)}.log,.ending{display:none}.building{width:36%}.studio,.cafe{display:none}.stats{width:210px;font-size:13px}.hero{transform:translateX(-50%) scale(.8)}.hint{display:none}.choiceBar{width:96%;bottom:1%}.choice{font-size:14px}.panel{padding:12px}.date{font-size:15px}}

/* extra easter eggs + hidden npc */
.secretNpc{position:absolute;left:63%;bottom:31%;width:42px;height:86px;z-index:4;opacity:0;pointer-events:none;transition:opacity .8s ease,transform .8s ease;filter:drop-shadow(0 0 18px rgba(255,238,190,.3));animation:npcFloat 4s ease-in-out infinite}.secretNpc.show{opacity:.82;pointer-events:auto;cursor:pointer}.secretNpc:before{content:"";position:absolute;left:9px;top:0;width:25px;height:25px;border-radius:50%;background:#fff0c8;box-shadow:0 0 16px rgba(255,240,200,.65)}.secretNpc:after{content:"";position:absolute;left:5px;top:25px;width:34px;height:58px;border-radius:18px 18px 8px 8px;background:linear-gradient(rgba(120,96,145,.95),rgba(62,51,82,.75));box-shadow:inset 0 0 14px rgba(255,255,255,.18)}@keyframes npcFloat{50%{transform:translateY(-6px)}}
.ticket,.paperNote{position:absolute;z-index:72;background:rgba(255,241,203,.94);border-radius:12px;padding:9px 12px;font-size:13px;font-weight:900;color:#60465d;box-shadow:0 12px 32px rgba(0,0,0,.24);animation:noteRise 4.8s ease forwards;pointer-events:none}.paperNote{background:rgba(255,255,255,.82)}@keyframes noteRise{0%{opacity:0;transform:translateY(18px) rotate(-2deg)}14%,72%{opacity:1}to{opacity:0;transform:translateY(-55px) rotate(3deg)}}
.aurora{position:absolute;left:-10%;right:-10%;top:7%;height:26%;z-index:2;pointer-events:none;opacity:0;background:linear-gradient(100deg,transparent,rgba(137,255,209,.24),rgba(176,143,255,.18),transparent);filter:blur(18px);animation:auroraMove 9s ease-in-out forwards}.aurora.show{opacity:1}@keyframes auroraMove{0%{transform:translateX(-10%);opacity:0}20%,76%{opacity:.9}to{transform:translateX(10%);opacity:0}}


/* 修复版：侧栏不遮挡选项，通关动画独立浮层 */
.ending{right:1.6%;top:27%;bottom:auto;width:25%;max-height:42vh;overflow:auto;z-index:18;padding:16px}.ending::-webkit-scrollbar{width:6px}.ending::-webkit-scrollbar-thumb{background:rgba(90,65,88,.35);border-radius:99px}.choiceBar{z-index:24}.passOverlay{position:absolute;inset:0;z-index:95;display:none;align-items:center;justify-content:center;pointer-events:none;background:radial-gradient(circle at 50% 45%,rgba(255,235,180,.34),rgba(37,31,58,.16) 48%,rgba(18,16,30,.42));backdrop-filter:blur(3px)}.passOverlay.show{display:flex;animation:passFade 5.2s ease forwards}.passCard{width:min(560px,86vw);padding:30px 34px;border-radius:30px;background:rgba(255,240,210,.92);box-shadow:0 30px 100px rgba(0,0,0,.38),0 0 80px rgba(255,216,142,.32);text-align:center;color:#4d3a56;animation:passCard 5.2s ease forwards}.passCard h2{margin:0 0 12px;font-size:36px}.passCard p{font-size:18px;line-height:1.8;margin:0}.passSpark{position:absolute;width:8px;height:8px;border-radius:50%;background:#fff2b8;box-shadow:0 0 16px #fff0a6;animation:passSpark 2.8s linear forwards}@keyframes passFade{0%{opacity:0}10%,84%{opacity:1}100%{opacity:0}}@keyframes passCard{0%{opacity:0;transform:translateY(30px) scale(.92)}16%,78%{opacity:1;transform:none}100%{opacity:0;transform:translateY(-20px) scale(.96)}}@keyframes passSpark{to{opacity:0;transform:translateY(-120px) translateX(var(--dx)) scale(.2)}}
@media(max-width:900px){.ending{display:block;left:2%;right:auto;top:18%;width:45%;max-height:30vh;font-size:12px}.ending .badge{font-size:11px;padding:5px 7px}.ending p{display:none}}

/* === 2026-06-08：面板避让版，不挡底部选项与主体背景 === */
.log{left:1.4%!important;top:24%!important;bottom:auto!important;width:23.5%!important;max-height:32vh!important;z-index:14!important;background:rgba(255,238,210,.58)!important;box-shadow:0 10px 24px rgba(0,0,0,.12)!important;}
.ending{right:1.4%!important;top:24%!important;bottom:auto!important;width:23.5%!important;max-height:32vh!important;z-index:14!important;background:rgba(255,238,210,.58)!important;box-shadow:0 10px 24px rgba(0,0,0,.12)!important;}
.log:hover,.ending:hover{background:rgba(255,238,210,.82)!important;z-index:45!important;}
.log h3,.ending h3{font-size:20px;margin-bottom:8px!important}.log div{font-size:13px}.ending p{font-size:14px;line-height:1.65}.badge{font-size:12px!important;padding:6px 9px!important;margin:4px!important}
.choiceBar{z-index:80!important;bottom:1.4%!important}.hint{z-index:12!important;bottom:16.5%!important;opacity:.68}.hero{z-index:18}.building,.cat,.vending,.lamp{z-index:16}

let audioCtx=null,noiseNodes=[];function toggleSound(){if(audioCtx){noiseNodes.forEach(n=>{try{n.stop&&n.stop();n.disconnect&&n.disconnect()}catch(e){}});audioCtx.close();audioCtx=null;noiseNodes=[];return}audioCtx=new (window.AudioContext||window.webkitAudioContext)();let gain=audioCtx.createGain();gain.gain.value=.035;gain.connect(audioCtx.destination);let osc=audioCtx.createOscillator();osc.type='sine';osc.frequency.value=146;let lfo=audioCtx.createOscillator();let lfoGain=audioCtx.createGain();lfo.frequency.value=.08;lfoGain.gain.value=18;lfo.connect(lfoGain);lfoGain.connect(osc.frequency);osc.connect(gain);osc.start();lfo.start();noiseNodes.push(osc,lfo,gain)}


/* === 点击式悬浮抽屉逻辑：点模块展开，点其他地方收回 === */
function initFloatingPanels(){
  const panels=[document.querySelector('.log'),document.querySelector('.ending')].filter(Boolean);
  panels.forEach(panel=>{
    if(!panel.querySelector('.panelHintDot')){
      const dot=document.createElement('i');
      dot.className='panelHintDot';
      panel.appendChild(dot);
    }
    panel.addEventListener('click',ev=>{
      ev.stopPropagation();
      const willOpen=!panel.classList.contains('panelOpen');
      panels.forEach(p=>p.classList.remove('panelOpen'));
      if(willOpen) panel.classList.add('panelOpen');
    });
  });
  document.addEventListener('click',ev=>{
    if(!panels.some(p=>p.contains(ev.target))){
      panels.forEach(p=>p.classList.remove('panelOpen'));
    }
  });
  document.addEventListener('keydown',ev=>{
    if(ev.key==='Escape') panels.forEach(p=>p.classList.remove('panelOpen'));
  });
}
initFloatingPanels();
