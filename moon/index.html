<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>发疯文学生成器｜小街艺术装置版</title>
<style>
:root {
  --black:#111; --white:#fff; --hot:#ff2d55; --purple:#7c3aed;
  --cyan:#00e5ff; --yellow:#ffe600; --green:#39ff14; --orange:#ff7a00;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  margin:0; min-height:100vh; overflow-x:hidden; color:var(--black);
  font-family:"Arial Black","Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  background:
    radial-gradient(circle at 12% 10%, rgba(255,225,142,.28) 0 9%, transparent 10%),
    radial-gradient(circle at 88% 14%, rgba(134,208,202,.22) 0 10%, transparent 12%),
    radial-gradient(circle at 18% 88%, rgba(180,209,145,.18) 0 11%, transparent 13%),
    radial-gradient(circle at 76% 78%, rgba(223,154,96,.20) 0 13%, transparent 15%),
    radial-gradient(ellipse at 50% 105%, rgba(255,205,146,.16), transparent 42%),
    linear-gradient(180deg,#312d46 0%,#504766 46%,#755567 100%);
}
body::before {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    linear-gradient(to bottom, rgba(255,237,191,.07), rgba(20,15,33,.16)),
    radial-gradient(circle at 50% 18%, rgba(255,231,174,.14), transparent 34%),
    radial-gradient(ellipse at 22% 34%, rgba(255,246,210,.08), transparent 28%),
    radial-gradient(ellipse at 82% 58%, rgba(129,202,198,.07), transparent 30%),
    linear-gradient(90deg, transparent 0 8%, rgba(255,240,205,.045) 8% 12%, transparent 12% 28%, rgba(255,240,205,.035) 28% 33%, transparent 33% 68%, rgba(255,240,205,.04) 68% 73%, transparent 73% 100%);
  backdrop-filter: blur(.25px);
}
body::after {
  content:"啊啊啊 / 救命 / 别管 / 脑子冒烟";
  position:fixed; left:-26px; top:43%; width:720px; transform:rotate(-10deg);
  font-size:30px; font-weight:800; letter-spacing:2px; color:rgba(255,245,214,.09);
  text-shadow:0 3px 12px rgba(0,0,0,.18); pointer-events:none; z-index:0; white-space:nowrap;
}
.art-atmosphere{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.art-atmosphere::before{content:"";position:absolute;inset:-8%;background:
  linear-gradient(120deg, transparent 0 18%, rgba(255,240,204,.055) 19% 20%, transparent 21% 42%, rgba(255,255,255,.035) 43% 44%, transparent 45%),
  repeating-linear-gradient(105deg, rgba(255,255,255,.025) 0 1px, transparent 1px 20px);
  opacity:.72;filter:blur(.15px);}
.art-atmosphere::after{content:"";position:absolute;left:8%;right:8%;bottom:7%;height:38%;border-radius:48% 52% 0 0/38% 38% 0 0;background:
  linear-gradient(to top, rgba(18,15,26,.22), transparent 55%),
  repeating-linear-gradient(90deg, transparent 0 34px, rgba(255,221,157,.07) 34px 39px, transparent 39px 72px);
  mask-image:linear-gradient(to top, rgba(0,0,0,.7), transparent 72%);}
.art-orb{position:absolute;border-radius:50%;filter:blur(14px);opacity:.42;animation:orbDrift 13s ease-in-out infinite alternate;}
.o1{width:150px;height:150px;left:-44px;top:190px;background:rgba(255,206,139,.36)}
.o2{width:170px;height:170px;right:-56px;top:300px;background:rgba(124,173,194,.28);animation-delay:1.6s}
.o3{width:120px;height:120px;left:44%;bottom:48px;background:rgba(226,132,143,.22);animation-delay:2.4s}
.art-line{position:absolute;height:1px;background:linear-gradient(90deg,transparent,rgba(255,239,203,.42),transparent);transform:rotate(var(--rot));opacity:.52;animation:lineFloat 9s ease-in-out infinite alternate;}
.l1{width:220px;left:2%;top:28%;--rot:-9deg}.l2{width:180px;right:3%;top:66%;--rot:8deg;animation-delay:1.2s}.l3{width:150px;left:28%;top:13%;--rot:4deg;animation-delay:2.1s}
@keyframes orbDrift{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(12px,-18px,0) scale(1.08)}}
@keyframes lineFloat{from{translate:0 0}to{translate:0 -10px}}
.bg-doodle { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.bg-doodle span {
  position:absolute; display:inline-flex; align-items:center; justify-content:center;
  border:2px solid rgba(17,17,17,.75); box-shadow:3px 3px 0 rgba(17,17,17,.65); font-weight:900;
  transform:rotate(var(--rot)); opacity:.46; animation:bgFloat 6.5s ease-in-out infinite alternate;
}
.d1{left:18px;top:330px;background:#fff0a6;border-radius:999px;padding:8px 14px;--rot:12deg}
.d2{right:18px;top:405px;background:#fff;border-radius:16px;padding:10px 13px;--rot:-10deg;animation-delay:.5s}
.d3{display:none}
.d4{right:12px;top:655px;background:#a9cf7d;border-radius:999px;padding:8px 14px;--rot:9deg;animation-delay:1.2s}
.d5{left:50%;top:255px;background:#ff7a00;color:#fff;border-radius:16px;padding:8px 12px;--rot:5deg;animation-delay:.2s}
.d6{left:60%;bottom:30px;background:#fff;border-radius:999px;padding:8px 14px;--rot:-6deg;animation-delay:1.4s}
.d7{display:none}
.d8{right:4px;top:545px;background:#fff0a6;border-radius:14px;padding:8px 12px;--rot:15deg;animation-delay:1s}
.d9{display:none}
.d10{display:none}
@keyframes bgFloat { from{translate:0 0} to{translate:0 -8px} }
.street-ghost{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:.42}
.street-ghost::before,.street-ghost::after{content:"";position:absolute;bottom:0;border-radius:18px 18px 0 0;background:rgba(34,29,48,.28);box-shadow:inset 0 18px 35px rgba(255,231,174,.04)}
.street-ghost::before{left:8%;width:210px;height:410px}
.street-ghost::after{right:9%;width:230px;height:390px}
.street-ghost .wire{position:absolute;left:18%;right:18%;top:210px;height:2px;background:rgba(255,238,190,.14);transform:rotate(-3deg);box-shadow:0 42px 0 rgba(255,238,190,.06)}
.street-ghost .lamp{position:absolute;left:37%;top:300px;width:10px;height:410px;background:rgba(32,28,45,.28);border-radius:999px}
.street-ghost .lamp::before{content:"";position:absolute;left:-22px;top:-25px;width:58px;height:58px;border-radius:50%;background:rgba(255,198,123,.22);box-shadow:0 0 46px rgba(255,198,123,.20)}
.street-ghost .window{position:absolute;width:92px;height:58px;border-radius:14px;background:rgba(255,213,143,.12);box-shadow:0 0 24px rgba(255,213,143,.08)}
.street-ghost .w1{left:12%;bottom:310px}.street-ghost .w2{right:14%;bottom:335px}.street-ghost .w3{right:24%;bottom:245px}


.app { width:min(100%,430px); margin:0 auto; min-height:100vh; position:relative; z-index:1; padding:32px 20px 34px; }
.sticker {
  position:absolute; z-index:2; display:inline-flex; align-items:center; justify-content:center; padding:8px 12px;
  background:rgba(255,248,236,.9); border:2px solid rgba(17,17,17,.85); border-radius:999px; box-shadow:3px 3px 0 rgba(17,17,17,.65);
  font-size:13px; font-weight:900; transform:rotate(-7deg); animation:floaty 4.8s ease-in-out infinite alternate; opacity:.88;
}
.s1{top:18px;right:18px;background:#ffe600} .s2{top:118px;left:9px;background:#a9cf7d;transform:rotate(8deg);animation-delay:.2s}
.s3{display:none} .s4{bottom:88px;left:10px;background:#e96978;color:#fff;transform:rotate(10deg);animation-delay:.65s}
@keyframes floaty { from{translate:0 0} to{translate:0 -5px} }
.hero { padding-top:32px; margin-bottom:22px; }
.status { display:inline-block; background:#111; color:#ffe600; border:2px solid #ffe600; border-radius:999px; padding:8px 12px; font-size:13px; font-weight:900; transform:rotate(-2deg); box-shadow:4px 4px 0 rgba(0,0,0,.4); }
h1 { margin:18px 0 10px; font-size:48px; line-height:.95; color:#fff6d8; letter-spacing:-2px; text-shadow:0 5px 20px rgba(0,0,0,.42),0 0 28px rgba(255,232,184,.16); -webkit-text-stroke:.8px rgba(17,17,17,.82); transform:rotate(-2deg); animation:titlePop 1.1s cubic-bezier(.2,1.5,.2,1) both; }
@keyframes titlePop { 0%{opacity:0;transform:scale(.6) rotate(-8deg)} 65%{opacity:1;transform:scale(1.04) rotate(-1deg)} 100%{transform:scale(1) rotate(-2deg)} }
.sub { display:inline-block; background:#fff0a6; border:3px solid #111; box-shadow:4px 4px 0 rgba(17,17,17,.78); padding:9px 12px; border-radius:14px; font-size:15px; font-weight:900; transform:rotate(2deg); }
.mood-meter { margin-top:18px; width:100%; background:#fff; border:3px solid #111; border-radius:999px; box-shadow:4px 4px 0 rgba(17,17,17,.78); padding:5px; }
.mood-bar { height:18px; width:68%; border-radius:999px; background:linear-gradient(90deg,#39ff14,#ffe600,#ff2d55); border:2px solid #111; transition:.35s cubic-bezier(.2,1.4,.2,1); }
.mood-text { margin-top:8px; font-size:12px; color:#fff; font-weight:900; text-shadow:2px 2px 0 #111; }
.section-title { margin:26px 0 12px; color:#fff; font-size:17px; font-weight:900; text-shadow:3px 3px 0 #111; letter-spacing:.5px; }
.category-wrap { display:flex; gap:10px; flex-wrap:wrap; }
.cat { border:3px solid #111; background:#fff; color:#111; border-radius:15px; box-shadow:4px 4px 0 #111; padding:10px 12px; font-size:14px; font-weight:900; cursor:pointer; transform:rotate(var(--r)); transition:.16s ease; }
.cat.active { background:#fff0a6; box-shadow:5px 5px 0 #ff2d55; transform:scale(1.04) rotate(var(--r)); }
.cat:active,button:active { transform:translate(4px,4px) scale(.98) rotate(var(--r,0deg)); box-shadow:1px 1px 0 #111!important; }

.card-shell { position:relative; margin-top:26px; }
.card-label { position:absolute; left:18px; top:-17px; z-index:3; background:#e96978; color:#fff; border:3px solid #111; border-radius:999px; padding:8px 14px; box-shadow:4px 4px 0 #111; font-size:13px; font-weight:900; transform:rotate(-5deg); }
.emoji-badge { position:absolute; right:14px; top:-22px; z-index:3; width:54px; height:54px; display:grid; place-items:center; background:#89d5ce; border:3px solid #111; border-radius:18px; box-shadow:4px 4px 0 rgba(17,17,17,.78); font-size:31px; transform:rotate(10deg); }
.emoji-badge.spin { animation:spinPop .42s ease both; }
@keyframes spinPop { 0%{transform:rotate(-20deg) scale(.5)} 70%{transform:rotate(18deg) scale(1.18)} 100%{transform:rotate(10deg) scale(1)} }
.mad-card { min-height:284px; background:linear-gradient(145deg,rgba(255,250,239,.94),rgba(255,239,216,.88)); backdrop-filter:blur(10px); border:3px solid rgba(17,17,17,.86); border-radius:30px; padding:42px 22px 24px; box-shadow:8px 8px 0 rgba(17,17,17,.68),0 18px 42px rgba(32,24,44,.24); position:relative; overflow:hidden; }
.mad-card::before { content:"MOONLIGHT / CRAZY / STREET"; position:absolute; right:-55px; top:44px; transform:rotate(90deg); font-size:18px; color:rgba(112,82,123,.12); font-weight:900; letter-spacing:2px; }
.mad-card::after { content:"!!!"; position:absolute; left:12px; bottom:-20px; font-size:96px; line-height:1; color:rgba(255,210,134,.32); -webkit-text-stroke:2px rgba(0,0,0,.15); font-weight:900; }
.mad-text { position:relative; z-index:2; font-size:26px; line-height:1.38; font-weight:750; white-space:pre-line; letter-spacing:-.5px; }
.mad-text .hot { background:#fff0a6; color:#ff2d55; padding:0 4px; border:2px solid #111; box-shadow:2px 2px 0 rgba(17,17,17,.78),0 0 14px rgba(255,226,153,.26); display:inline-block; transform:rotate(-2deg); }
.tools { margin-top:22px; display:grid; gap:12px; }
.primary { width:100%; height:62px; border:4px solid #111; border-radius:20px; background:#fff0a6; color:#111; box-shadow:7px 7px 0 #111; font-size:21px; font-weight:900; cursor:pointer; position:relative; overflow:hidden; }
.primary::after { content:""; position:absolute; inset:-40%; background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.7),transparent 65%); transform:translateX(-120%) rotate(8deg); }
.primary:hover::after { animation:shine .75s ease; } @keyframes shine { to{transform:translateX(120%) rotate(8deg)} }
.secondary-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.secondary { min-height:50px; border:3px solid #111; border-radius:16px; background:rgba(255,248,236,.94); color:#111; box-shadow:4px 4px 0 rgba(17,17,17,.76); font-size:15px; font-weight:900; cursor:pointer; }
.share-stage { margin-top:24px; display:none; animation:rise .28s ease both; } .share-stage.show{display:block}
@keyframes rise { from{opacity:0;transform:translateY(24px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
.poster-title{color:#fff;font-size:18px;font-weight:900;text-shadow:3px 3px 0 #111;margin:0 0 12px}
.poster{width:100%;min-height:520px;border:4px solid #111;border-radius:28px;background:radial-gradient(circle at 20% 15%,#ffe600 0 14%,transparent 15%),radial-gradient(circle at 86% 20%,#00e5ff 0 16%,transparent 17%),linear-gradient(145deg,#ff2d55,#7c3aed 58%,#111);box-shadow:9px 9px 0 #111;padding:22px;position:relative;overflow:hidden}
.poster::before{content:"疯疯文学研究所";position:absolute;right:-42px;top:230px;transform:rotate(90deg);color:rgba(255,255,255,.18);font-size:18px;font-weight:900;letter-spacing:3px}
.poster-head{color:#fff;font-size:32px;line-height:1;font-weight:900;-webkit-text-stroke:1.5px #111;text-shadow:4px 4px 0 #ffe600;transform:rotate(-3deg)}
.poster-body{margin-top:36px;background:#fff;border:4px solid #111;border-radius:24px;box-shadow:7px 7px 0 #111;min-height:270px;padding:24px 18px;font-size:28px;line-height:1.35;font-weight:900;white-space:pre-line}
.poster-foot{margin-top:22px;display:flex;gap:14px;align-items:center}
.qr{width:78px;height:78px;border:4px solid #111;background:linear-gradient(90deg,#000 10px,transparent 10px 20px,#000 20px 30px,transparent 30px),linear-gradient(#000 10px,transparent 10px 20px,#000 20px 30px,transparent 30px),#fff;background-size:30px 30px;box-shadow:5px 5px 0 #111}
.poster-tip{flex:1;background:#fff0a6;border:3px solid #111;border-radius:16px;box-shadow:4px 4px 0 rgba(17,17,17,.78);padding:10px;font-size:14px;line-height:1.35;font-weight:900;transform:rotate(2deg)}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(30px);opacity:0;background:#111;color:#ffe600;border:3px solid #ffe600;box-shadow:5px 5px 0 #000;border-radius:999px;padding:10px 15px;font-size:14px;font-weight:900;z-index:20;transition:.2s ease;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.shake{animation:shake .24s linear} @keyframes shake{0%{transform:translateX(0) rotate(0deg)}25%{transform:translateX(-6px) rotate(-1deg)}50%{transform:translateX(6px) rotate(1deg)}75%{transform:translateX(-4px) rotate(-1deg)}100%{transform:translateX(0) rotate(0deg)}}
.burst{position:fixed;z-index:30;pointer-events:none;font-size:21px;font-weight:900;color:#ffe600;-webkit-text-stroke:1.4px #111;animation:burstFly 1.45s ease-out forwards}
@keyframes burstFly{from{opacity:1;transform:translate(-50%,-50%) scale(.55) rotate(0deg)}to{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25) rotate(var(--rot))}}
.screen-flash{position:fixed;inset:0;z-index:25;background:rgba(255,225,160,.16);pointer-events:none;opacity:0} .screen-flash.show{animation:flash .28s ease-out} @keyframes flash{0%{opacity:0}35%{opacity:1}100%{opacity:0}}
.flying-sticker{position:fixed;left:50%;top:50%;z-index:28;pointer-events:none;padding:7px 11px;border:3px solid #111;border-radius:999px;background:#fff;box-shadow:4px 4px 0 #111;font-weight:900;font-size:13px;animation:stickerFly 1.65s ease-out forwards}
@keyframes stickerFly{from{opacity:0;transform:translate(-50%,-50%) scale(.5) rotate(-20deg)}20%{opacity:1}to{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.15) rotate(var(--rot))}}


/* === v4 艺术装置微调：留白 / 胶片 / 景深 / 空间感 === */
body{
  background:
    radial-gradient(circle at 14% 12%, rgba(255,225,142,.20) 0 7%, transparent 8%),
    radial-gradient(circle at 88% 14%, rgba(134,208,202,.15) 0 9%, transparent 11%),
    radial-gradient(ellipse at 50% 108%, rgba(255,205,146,.12), transparent 42%),
    linear-gradient(180deg,#29283d 0%,#443d59 48%,#665064 100%);
}
/* 更轻的文字残影，避免满屏喊叫 */
body::after{opacity:.58;color:rgba(255,245,214,.055);font-size:26px;top:46%;}
/* 胶片颗粒 + 暗角：很轻，不做复古滤镜 */
.film-layer{position:fixed;inset:0;z-index:4;pointer-events:none;mix-blend-mode:soft-light;opacity:.42;background:
  radial-gradient(ellipse at center, transparent 42%, rgba(10,8,18,.32) 100%),
  repeating-radial-gradient(circle at 18% 28%, rgba(255,255,255,.06) 0 1px, transparent 1px 3px),
  repeating-linear-gradient(100deg, rgba(255,255,255,.035) 0 1px, transparent 1px 34px);
}
.film-layer::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 0 6%,rgba(255,255,255,.035) 6.2%,transparent 6.5% 72%,rgba(0,0,0,.04) 72.2%,transparent 72.6%);opacity:.45;}
/* 安静区：页面左下留出一块只剩灯和雾的区域，让“疯”有对比 */
.quiet-corner{position:fixed;left:0;bottom:0;width:min(54vw,250px);height:36vh;z-index:0;pointer-events:none;opacity:.8;background:
  radial-gradient(circle at 34% 42%, rgba(255,207,139,.18), transparent 24%),
  linear-gradient(to top, rgba(20,17,31,.26), transparent 68%);filter:blur(.2px);}
.quiet-corner::before{content:"";position:absolute;left:52px;bottom:0;width:7px;height:210px;border-radius:99px;background:rgba(21,19,31,.36);}
.quiet-corner::after{content:"";position:absolute;left:31px;bottom:188px;width:52px;height:52px;border-radius:50%;background:rgba(255,206,128,.18);box-shadow:0 0 58px rgba(255,206,128,.23);}
/* 前后景深：远景更虚，近景更清 */
.street-ghost{opacity:.34;filter:blur(.9px);transform:scale(1.02);transform-origin:center bottom;}
.art-atmosphere::after{opacity:.74;filter:blur(.6px);}
.art-orb{opacity:.30;filter:blur(20px);animation-duration:18s;}
.art-line{opacity:.30;animation-duration:14s;}
/* 大幅减少信息密度：只保留少数“精神标记” */
.bg-doodle span{opacity:.28;filter:blur(.15px);animation-duration:10s;}
.d2,.d4,.d6,.d8{display:none!important;}
.d1{left:22px;top:360px}.d5{left:58%;top:245px}.d3,.d7,.d9,.d10{display:none!important;}
.sticker{opacity:.72;animation-duration:7.5s;}
.s2,.s4{display:none!important;}
.s1{top:34px;right:24px;background:rgba(255,240,166,.82);}
/* 主视觉更像展览海报，不像普通网页 */
.app{padding-top:52px;}
.hero{padding-top:44px;margin-bottom:30px;}
.status{background:rgba(17,17,17,.74);color:#ffe9a7;border-color:rgba(255,230,166,.78);box-shadow:0 10px 28px rgba(0,0,0,.25);}
h1{font-size:46px;letter-spacing:-1.5px;text-shadow:0 8px 26px rgba(0,0,0,.5),0 0 36px rgba(255,232,184,.13);}
.sub{background:rgba(255,240,166,.78);box-shadow:3px 3px 0 rgba(17,17,17,.62),0 10px 28px rgba(0,0,0,.16);}
.section-title{margin-top:34px;color:rgba(255,247,222,.92);text-shadow:0 4px 18px rgba(0,0,0,.45);}
.cat{background:rgba(255,248,236,.82);box-shadow:3px 3px 0 rgba(17,17,17,.62);border-color:rgba(17,17,17,.82);}
.cat.active{background:rgba(255,240,166,.86);box-shadow:4px 4px 0 rgba(233,105,120,.72);}
.card-shell{margin-top:36px;perspective:900px;}
.card-label{background:rgba(218,101,120,.88);box-shadow:3px 3px 0 rgba(17,17,17,.68);}
.emoji-badge{opacity:.92;box-shadow:3px 3px 0 rgba(17,17,17,.62),0 12px 32px rgba(0,0,0,.18);}
.mad-card{transform:rotateX(.8deg);background:linear-gradient(145deg,rgba(255,251,241,.88),rgba(255,237,216,.78));border-color:rgba(17,17,17,.72);box-shadow:7px 7px 0 rgba(17,17,17,.50),0 28px 68px rgba(22,17,33,.34);}
.mad-card::before{color:rgba(112,82,123,.075);}
.mad-card::after{opacity:.58;}
.mad-text{font-weight:700;color:rgba(22,20,27,.96);}
.mad-text .hot{background:rgba(255,240,166,.84);box-shadow:2px 2px 0 rgba(17,17,17,.58),0 0 18px rgba(255,226,153,.22);}
.tools{margin-top:26px;}
.primary{background:rgba(255,240,166,.9);box-shadow:5px 5px 0 rgba(17,17,17,.72),0 16px 36px rgba(0,0,0,.18);}
.secondary{background:rgba(255,248,236,.82);box-shadow:3px 3px 0 rgba(17,17,17,.58);}
/* 点击反馈收敛：不再像爆炸特效，像小纸片飘出 */
.screen-flash{background:rgba(255,225,160,.09);}
.burst{font-size:18px;color:#fff0a6;-webkit-text-stroke:1px rgba(17,17,17,.72);opacity:.9;}
.flying-sticker{opacity:.82;box-shadow:3px 3px 0 rgba(17,17,17,.58);}

const cats = document.querySelectorAll(".cat");

const flash = document.getElementById("screenFlash");
let current = "work";
let lastTextPlain = "";
function plain(html) { const div = document.createElement("div"); div.innerHTML = html; return div.innerText; }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function rand(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }
function generate(type = current) {
  current = type;
  const group = library[current];
  const html = pick(group.lines);
  const emoji = pick(group.emoji);
  const madness = rand(64,99);
  madText.innerHTML = html;
  lastTextPlain = plain(html);
  label.textContent = group.label;
  emojiBadge.textContent = emoji;
  statusText.textContent = pick(group.status);
  moodBar.style.width = madness + "%";
  moodText.textContent = "崩溃值：" + madness + "%｜" + (madness > 90 ? "建议立即发疯" : madness > 78 ? "已经开始冒烟" : "还能抢救一下");
  madCard.classList.remove("shake"); emojiBadge.classList.remove("spin"); flash.classList.remove("show");
  void madCard.offsetWidth;
  madCard.classList.add("shake"); emojiBadge.classList.add("spin"); flash.classList.add("show");
  burst(window.innerWidth/2, window.innerHeight*.45);
  flySticker();
}
cats.forEach(btn => {
  btn.addEventListener("click", () => {
    cats.forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    generate(btn.dataset.type);
  });
});

document.getElementById("chaosBtn").addEventListener("click", e => {
  const keys = Object.keys(library);
  const random = pick(keys);
  cats.forEach(c => c.classList.toggle("active", c.dataset.type === random));
  generate(random);
  burstFromButton(e.currentTarget);
});

  try {
    await navigator.clipboard.writeText(text);

    burstFromButton(e.currentTarget, ["复制成功","发出去","让朋友也疯"]);
  } catch(error) {
    showToast("复制失败，手动长按复制！");
  }
});
document.getElementById("shareBtn").addEventListener("click", e => {
  const text = lastTextPlain || madText.innerText;
  posterBody.textContent = text;
  shareStage.classList.add("show");
  shareStage.scrollIntoView({behavior:"smooth",block:"start"});
  burstFromButton(e.currentTarget, ["疯图生成","截图发出去","朋友圈爆炸"]);

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");

}
function burstFromButton(btn, words) {
  const rect = btn.getBoundingClientRect();
  burst(rect.left + rect.width/2, rect.top + rect.height/2, words);
}
function burst(x, y, words = ["纸片飞走","月亮旁观","轻微冒烟","别管我"]) {
  for(let i=0; i<2; i++) {
    const el = document.createElement("div");
    el.className = "burst";
    el.textContent = pick(words);
    el.style.left = x + "px";
    el.style.top = y + "px";
    el.style.setProperty("--dx", rand(-160,160) + "px");
    el.style.setProperty("--dy", rand(-210,120) + "px");
    el.style.setProperty("--rot", rand(-90,90) + "deg");
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1450);
  }
}
function flySticker() {
  const stickers = ["轻微冒烟","灵魂出走","月光旁观","精神稳定"];
  for(let i=0; i<1; i++) {
    const el = document.createElement("div");
    el.className = "flying-sticker";
    el.textContent = pick(stickers);
    const bg = pick(["#fff0a6","#fff8ec","#89d5ce","#e96978"]);
    el.style.background = bg;
    el.style.color = bg === "#ff2d55" ? "#fff" : "#111";
    el.style.setProperty("--dx", rand(-240,240) + "px");
    el.style.setProperty("--dy", rand(-300,180) + "px");
    el.style.setProperty("--rot", rand(-45,45) + "deg");
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1700);
  }
}

}

  if(!ambientWhisperLayer) return;

    {x: 76, y: 22},
    {x: 18, y: 72},
    {x: 74, y: 68},
    {x: 50, y: 18},
    {x: 52, y: 76}

  el.style.setProperty('--dy', randomBetween(-48, -18) + 'px');
  ambientWhisperLayer.appendChild(el);
  setTimeout(() => el.remove(), 14000);
}

  const delay = randomBetween(14000,22000);
  setTimeout(() => {
    spawnAmbientWhisper();
    scheduleAmbientWhisper();

}
